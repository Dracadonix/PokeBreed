<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Streamliner</title>
    <style>
        :root {
            --primary: #ff1c1c;
            --secondary: #3b4cca;
            --bg: #f4f4f9;
            --card: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--secondary); }
        button { padding: 12px 20px; background: var(--secondary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2a3a8c; }
        #output { line-height: 1.6; border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .badge { display: inline-block; background: #eef; color: var(--secondary); padding: 2px 10px; border-radius: 20px; font-size: 0.85em; font-weight: bold; margin-right: 5px; }
        .step { margin-bottom: 15px; padding-left: 10px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ PokeBreed</h1>
    <p class="subtitle">Type your goal (e.g., "Jolly 5IV Magikarp")</p>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="What do you want to breed?">
        <button onclick="generateGuide()">Plan</button>
    </div>

    <div id="output">
        <h2 id="pokeName"></h2>
        <div id="eggGroups"></div>
        <hr>
        <div id="stepsList"></div>
    </div>
</div>

<script>
    async function generateGuide() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const outputDiv = document.getElementById('output');
        const stepsList = document.getElementById('stepsList');
        
        // Simple name extraction (assumes first word is the Pokemon)
        const words = input.split(' ').filter(w => w.length > 2 && !['want', 'breed', 'with', 'how'].includes(w));
        const pokemonName = words[0];

        if (!pokemonName) return alert("Please enter a Pokémon name!");

        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonName}`);
            const data = await response.json();
            const speciesResp = await fetch(data.species.url);
            const speciesData = await speciesResp.json();

            // Setup UI
            outputDiv.style.display = 'block';
            document.getElementById('pokeName').innerText = `Roadmap for ${data.name.toUpperCase()}`;
            
            const groups = speciesData.egg_groups.map(g => `<span class="badge">${g.name.toUpperCase()}</span>`).join('');
            document.getElementById('eggGroups').innerHTML = `<strong>Egg Groups:</strong> ${groups}`;

            // Logic Logic
            let steps = [];
            const natures = ["jolly", "timid", "adamant", "modest", "bold", "calm", "careful", "impish"];
            const foundNature = natures.find(n => input.includes(n));

            if (foundNature) {
                steps.push(`Give an <strong>Everstone</strong> to the <strong>${foundNature}</strong> parent to pass down the nature.`);
            }

            if (input.includes("iv") || input.includes("stats")) {
                steps.push("Give a <strong>Destiny Knot</strong> to a high-IV parent to ensure 5 stats are inherited.");
            }

            // Check for Egg Moves
            const eggMoves = data.moves
                .filter(m => m.version_group_details.some(v => v.move_learn_method.name === 'egg'))
                .map(m => m.move.name.replace('-', ' '));
            
            const targetMove = eggMoves.find(m => input.includes(m));
            if (targetMove) {
                steps.push(`<strong>Egg Move Detected:</strong> Ensure the male parent knows <strong>${targetMove}</strong>.`);
            } else {
                steps.push(`Pair with a Ditto or a male from the ${speciesData.egg_groups[0].name} group.`);
            }

            steps.push("Keep a Pokémon with <strong>Flame Body</strong> in your party to hatch eggs twice as fast.");

            stepsList.innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');

        } catch (error) {
            alert("Pokémon not found! Double check the spelling.");
        }
    }
</script>

</body>
</html>

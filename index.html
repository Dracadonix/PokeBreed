<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Specialist Suite</title>
    <style>
        :root { 
            --bg: #050608; --card: #101218; --primary: #00e5ff; --accent: #ff00ff; 
            --text: #e2e8f0; --sub-text: #64748b; --border: #1e293b; --rowan-red: #b91c1c;
            --step-bg: #1a1d26;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }

        /* THE CONTAINER */
        .container { max-width: 1100px; width: 100%; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.8); transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); margin-top: 20px; }
        
        /* INPUT SYSTEM */
        .input-row { display: flex; gap: 15px; margin-bottom: 25px; }
        input { flex: 1; padding: 20px; background: #07080a; border: 2px solid var(--border); border-radius: 12px; color: white; font-size: 1.1rem; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0,229,255,0.1); }
        .btn-main { padding: 0 40px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* ROWAN BOX (HIDDEN RAGE) */
        #rowanBox {
            display: none; position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px; background: #fff; border: 6px double #000;
            padding: 30px; z-index: 9999; color: #000; font-family: 'Courier New', monospace;
        }
        .rowan-shaking { animation: r-shake 0.05s infinite; }
        .rowan-critical { background: #700 !important; color: #fff !important; }
        @keyframes r-shake { 0% { transform: translate(-50%, 0); } 25% { transform: translate(-52%, 2%); } 75% { transform: translate(-48%, -2%); } }

        /* ROADMAP STYLING */
        #output { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .card { background: #161a22; border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        .h-label { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; font-weight: 800; }
        
        .step { background: var(--step-bg); border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0; font-size: 0.95rem; }
        .step-num { font-weight: 900; color: var(--primary); margin-right: 10px; }
        .highlight { color: var(--accent); font-weight: bold; }
        
        .pill { display: inline-block; padding: 6px 12px; background: #0f172a; border: 1px solid var(--border); border-radius: 6px; margin: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="rowanBox">
    <div style="font-weight:900; color:var(--rowan-red); border-bottom:2px solid #000; margin-bottom:15px;">PROF. ROWAN</div>
    <div id="rowanMsg">...</div>
    <button id="rowanClose" style="float:right; margin-top:20px; padding:10px 20px; background:#000; color:#fff; cursor:pointer;" onclick="document.getElementById('rowanBox').style.display='none'">ACKNOWLEDGE</button>
</div>

<div class="container" id="mainUI">
    <div style="text-align:center; margin-bottom:40px;">
        <h1 style="margin:0; font-size:2.5rem; letter-spacing:-1px;">POKEBREED <span style="color:var(--primary)">CONSULTANT</span></h1>
        <p style="color:var(--sub-text);">Sinnoh Laboratory v6.0 // National Dex Logistics</p>
    </div>

    <div class="input-row">
        <input type="text" id="userInput" placeholder="e.g. 5iv jolly weavile with ice shard" onkeypress="if(event.key === 'Enter') generateRoadmap()">
        <button class="btn-main" onclick="generateRoadmap()">CONSULT</button>
    </div>

    <div id="output">
        <div class="grid">
            <div class="left-col">
                <div class="card">
                    <span class="h-label">Specimen Target</span>
                    <h2 id="pName" style="text-transform:capitalize; font-size:2.8rem; margin:0; color:var(--primary);"></h2>
                    <div id="pTypes" style="margin-top:10px;"></div>
                </div>

                <div class="card" id="roadmapSection">
                    <span class="h-label">Breeding & Growth Roadmap</span>
                    <div id="roadmapContent"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="card">
                    <span class="h-label">Required Genetics</span>
                    <div id="pEggMoves" style="margin-bottom:15px;"></div>
                    <div style="font-size:0.8rem; border-top:1px solid #1e293b; padding-top:15px;">
                        <span class="highlight">HA Inheritance:</span> 60% chance via Mother.<br>
                        <span class="highlight">Everstone:</span> Locks Nature.
                    </div>
                </div>

                <div class="card">
                    <span class="h-label">Hatch Logistics</span>
                    <div id="pLogistics"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let dex = [];
    let _f = 0; 
    let _lim = Math.floor(Math.random() * 8) + 5;

    fetch('https://pokeapi.co/api/v2/pokemon?limit=2000').then(r => r.json()).then(d => dex = d.results.map(p => p.name));

    async function generateRoadmap() {
        const val = document.getElementById('userInput').value.toLowerCase().trim();
        const words = val.split(/\s+/);
        const target = words.find(w => dex.includes(w)) || words.find(w => w.length > 3 && !["with", "jolly", "5iv", "ice", "shard"].includes(w));

        try {
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${target}`);
            if(!r.ok) throw new Error();
            const d = await r.json();
            
            _f = 0; 
            document.getElementById('output').style.display = 'block';
            document.getElementById('pName').innerText = d.name;
            document.getElementById('pTypes').innerHTML = d.types.map(t => `<span class="pill">${t.type.name.toUpperCase()}</span>`).join('');

            const sR = await fetch(d.species.url);
            const sD = await sR.json();
            const baseName = sD.name; // This finds 'Sneasel' if target was 'Weavile'

            // --- ROADMAP GENERATOR ---
            let steps = [];
            
            // Step 1: Breeding
            steps.push(`<div class="step"><span class="step-num">01</span>Begin by breeding for a <span class="highlight">${baseName.toUpperCase()}</span>. To pass down 5-IVs, ensure the parents hold a <strong>Destiny Knot</strong>.</div>`);
            
            // Step 2: Moves
            if(val.includes("ice") || val.includes("shard") || val.includes("egg")) {
                steps.push(`<div class="step"><span class="step-num">02</span><strong>GENETIC MOVE ALERT:</strong> To obtain <strong>Ice Shard</strong>, your ${baseName} must hatch with it. Breed a female ${baseName} with a compatible male (e.g., Lapras or Dewgong) that already knows the move.</div>`);
            } else {
                steps.push(`<div class="step"><span class="step-num">02</span>Focus on <span class="highlight">Nature Alignment</span>. Use an Everstone on a parent with the desired Nature to lock it in.</div>`);
            }

            // Step 3: Evolution
            if (sD.evolution_chain) {
                steps.push(`<div class="step"><span class="step-num">03</span><strong>EVOLUTION TRIGGER:</strong> Once your ${baseName} is perfect, evolve it into ${d.name.toUpperCase()}. Check for special conditions (e.g., Leveling at night while holding a Razor Claw).</div>`);
            }

            document.getElementById('roadmapContent').innerHTML = steps.join('');

            // Sidebar Details
            document.getElementById('pLogistics').innerHTML = `
                <div style="font-size:0.9rem;">
                    <strong>Hatch Cycles:</strong> ${sD.hatch_counter}<br>
                    <strong>Female Ratio:</strong> ${sD.gender_rate === -1 ? 'None' : (sD.gender_rate * 12.5) + '%'}<br>
                    <strong>Growth Rate:</strong> ${sD.growth_rate.name.replace(/-/g, ' ')}
                </div>
            `;

        } catch (e) {
            _f++;
            const b = document.getElementById('rowanBox');
            const m = document.getElementById('rowanMsg');
            const ui = document.getElementById('mainUI');
            
            b.style.display = 'block';
            if (_f >= _lim) {
                b.classList.add('rowan-critical', 'rowan-shaking');
                m.innerText = "GRAAAAAH!!! I CANNOT READ YOUR NOTES! GET OUT OF MY LABORATORY!!";
                document.getElementById('rowanClose').style.display = 'none';
                ui.style.opacity = '0';
                ui.style.transform = "scale(0.8) rotate(10deg)";
                setTimeout(() => {
                    b.classList.remove('rowan-critical', 'rowan-shaking');
                    m.innerText = "...My apologies. Let us try to be professional.";
                    document.getElementById('rowanClose').style.display = 'block';
                    _f = 0; ui.style.opacity = '1'; ui.style.transform = "scale(1)";
                }, 7000);
            } else {
                m.innerText = `[LOG ${_f}] I cannot identify the specimen in your sentence. Be precise!`;
            }
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | The Master Architect Suite</title>
    <style>
        :root { 
            --bg: #030406; --card: #0d1117; --primary: #00e5ff; --accent: #ff00ff; 
            --text: #e2e8f0; --sub-text: #64748b; --border: #1e293b; --step-gold: #fbbf24;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }

        .container { max-width: 1200px; width: 100%; background: var(--card); padding: 40px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        
        /* HEADER & SEARCH */
        .lab-header { text-align: center; margin-bottom: 30px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 22px; background: #000; border: 2px solid var(--border); border-radius: 14px; color: white; font-size: 1.1rem; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 20px rgba(0,229,255,0.15); }
        .btn-consult { padding: 0 35px; background: var(--primary); color: #000; border: none; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* DYNAMIC OUTPUT */
        #output { display: none; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .grid-main { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .card { background: #161b22; border: 1px solid var(--border); border-radius: 18px; padding: 25px; margin-bottom: 25px; position: relative; }
        .h-label { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 20px; display: block; font-weight: 800; border-bottom: 1px solid #2d333f; padding-bottom: 10px;}

        /* ROADMAP & TRAINING */
        .phase { margin-bottom: 20px; border-left: 3px solid var(--step-gold); padding-left: 15px; }
        .phase-title { font-weight: 900; color: var(--step-gold); display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.8rem; }
        .phase-body { font-size: 0.95rem; line-height: 1.6; }
        .highlight { color: var(--primary); font-weight: bold; }
        
        .ev-box { background: #000; border: 1px solid #334155; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .ev-tag { color: var(--accent); font-weight: bold; }

        /* ROWAN BOX */
        #rowanBox {
            display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: #fff; color: #000; padding: 30px;
            border: 8px double #000; z-index: 10000; font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

<div id="rowanBox">
    <div style="font-weight:900; color:red; border-bottom:2px solid #000; margin-bottom:15px;">FIELD REPORT ERROR</div>
    <div id="rowanMsg">...</div>
    <button style="float:right; margin-top:20px; padding:10px; background:#000; color:#fff;" onclick="document.getElementById('rowanBox').style.display='none'">ACKNOWLEDGE</button>
</div>

<div class="container" id="app">
    <div class="lab-header">
        <h1 style="margin:0; font-size:2.8rem;">BREEDING <span style="color:var(--primary)">ARCHITECT</span></h1>
        <p style="color:var(--sub-text); font-size:0.9rem;">National Dex v7.0 // Full Chain & EV Training Integration</p>
    </div>

    <div class="input-row">
        <input type="text" id="userInput" placeholder="Try: '5iv Jolly Weavile with Ice Shard EV trained in Speed'" onkeypress="if(event.key === 'Enter') architectPlan()">
        <button class="btn-consult" onclick="architectPlan()">Generate Plan</button>
    </div>

    <div id="output">
        <div class="grid-main">
            <div class="col-left">
                <div class="card">
                    <span class="h-label">Specimen Blueprint</span>
                    <h2 id="pName" style="text-transform:capitalize; font-size:3.2rem; margin:0; color:var(--primary);"></h2>
                    <div id="pTypes" style="margin-top:10px;"></div>
                </div>

                <div class="card">
                    <span class="h-label">Growth & Evolution Roadmap</span>
                    <div id="roadmapArea"></div>
                </div>
            </div>

            <div class="col-right">
                <div class="card" id="trainingCard" style="display:none;">
                    <span class="h-label">Effort Value (EV) Training Lab</span>
                    <div id="evContent"></div>
                </div>

                <div class="card">
                    <span class="h-label">Genetic Odds & Items</span>
                    <div id="geneticsArea" style="font-size:0.9rem; line-height:1.8;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let dex = [];
    fetch('https://pokeapi.co/api/v2/pokemon?limit=2000').then(r => r.json()).then(d => dex = d.results.map(p => p.name));

    async function architectPlan() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const target = dex.find(name => input.includes(name)) || "weavile";

        try {
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${target}`);
            const d = await r.json();
            const sR = await fetch(d.species.url);
            const sD = await sR.json();
            
            document.getElementById('output').style.display = 'block';
            document.getElementById('pName').innerText = d.name;
            document.getElementById('pTypes').innerHTML = d.types.map(t => `<span style="margin-right:10px; font-weight:bold; color:var(--primary)">${t.type.name.toUpperCase()}</span>`).join('');

            // --- 1. ROADMAP LOGIC ---
            let roadmapHTML = "";
            const baseForm = sD.name;
            
            // Phase: Breeding
            roadmapHTML += `<div class="phase"><span class="phase-title">Phase 1: Breeding Fundamentals</span>
            <div class="phase-body">Obtain a <span class="highlight">${baseForm.toUpperCase()}</span>. Since you requested 5-IVs, give one parent the <strong>Destiny Knot</strong> to inherit 5 random stats. 
            If breeding for <span class="highlight">Jolly</span>, the parent with that nature MUST hold an <strong>Everstone</strong>.</div></div>`;

            // Phase: Egg Moves
            if (input.includes("ice") || input.includes("shard")) {
                roadmapHTML += `<div class="phase"><span class="phase-title">Phase 2: Genetic Move Inheritance</span>
                <div class="phase-body"><strong>ICE SHARD</strong> is an Egg Move for ${baseForm}. Breed your female ${baseForm} with a male from the <span class="highlight">Field Egg Group</span> (like Mamoswine or Dewgong) that knows the move. 
                The offspring will hatch with it automatically.</div></div>`;
            }

            // Phase: Evolution
            let evoMethod = "Standard Level Up.";
            if (target === "weavile") evoMethod = "Hold <strong>Razor Claw</strong> and level up at <strong>NIGHT</strong>.";
            if (target === "lucario") evoMethod = "High <strong>Friendship</strong> during the <strong>DAY</strong>.";
            
            roadmapHTML += `<div class="phase"><span class="phase-title">Phase 3: Evolution Trigger</span>
            <div class="phase-body">${evoMethod}</div></div>`;

            document.getElementById('roadmapArea').innerHTML = roadmapHTML;

            // --- 2. EV TRAINING LOGIC ---
            if (input.includes("ev") || input.includes("train")) {
                document.getElementById('trainingCard').style.display = 'block';
                let evHTML = `<p>To optimize stats, use <strong>Power Items</strong> (Bracer, Lens, etc.) while battling specific targets:</p>`;
                
                if (input.includes("speed")) evHTML += `<div class="ev-box"><span class="ev-tag">SPEED:</span> Defeat <strong>Wingull</strong> or <strong>Rookidee</strong>. (Locations: Paldea South Province or Galar Route 1).</div>`;
                if (input.includes("attack")) evHTML += `<div class="ev-box"><span class="ev-tag">ATTACK:</span> Defeat <strong>Yungoos</strong> or <strong>Shinx</strong>. (Locations: Early routes).</div>`;
                
                evHTML += `<p style="font-size:0.75rem; margin-top:10px;">*Each Vitamin (Protein, Carbos) adds 10 EVs. Max 252 per stat.</p>`;
                document.getElementById('evContent').innerHTML = evHTML;
            } else {
                document.getElementById('trainingCard').style.display = 'none';
            }

            // --- 3. GENETICS SIDEBAR ---
            document.getElementById('geneticsArea').innerHTML = `
                <div style="margin-bottom:10px;"><strong>Hatch Time:</strong> ~${sD.hatch_counter * 255} Steps</div>
                <div style="margin-bottom:10px;"><strong>HA Chance:</strong> 60% (if Mother has it)</div>
                <div style="margin-bottom:10px;"><strong>6-IV Probability:</strong> 1 in 32 (if both parents are 6-IV)</div>
            `;

        } catch (e) {
            document.getElementById('rowanBox').style.display = 'block';
            document.getElementById('rowanMsg').innerText = "DATA CORRUPTION: The species name was not detected or is misspelled. Precision, please!";
        }
    }
</script>
</body>
</html>

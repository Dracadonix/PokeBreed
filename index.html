<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Shiny Umbreon Edition</title>
    <style>
        /* SHINY UMBREON COLOR PALETTE */
        :root { 
            --bg: #0c0d10;              /* Main body fur (Near black) */
            --bg-offset: #14161a;        /* UI Elements offset */
            --card: rgba(20, 22, 26, 0.95); /* Semi-Transparent cards */
            
            --primary: #00e5ff;          /* THE GLOW (Vibrant Cyan Blue) */
            --secondary: #303541;        /* Secondary fur tone (Deep Slate Grey) */
            --text: #f0f0f0;             /* Clean white text */
            --sub-text: #a0a8b5;         /* Muted grey text */
            
            --evo-color: #00d4ff;        /* Kept for evolution, but matches the theme */
            --border: #2d333f;           /* Card borders */
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            background-color: var(--bg);
            /* Adds a very subtle grid texture to the background */
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
            background-attachment: fixed;
        }
        
        .container { 
            max-width: 850px; 
            width: 100%; 
            background: var(--card); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); 
            border: 1px solid var(--border); 
            backdrop-filter: blur(10px); /* Glassmorphism for depth */
        }
        
        h1 { 
            color: var(--primary);       /* The cyan-blue glow */
            text-align: center; 
            font-size: 2.5em; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); /* Primary glow */
        }
        
        .subtitle { 
            text-align: center; 
            color: var(--sub-text); 
            margin-bottom: 30px; 
            font-size: 0.9em; 
        }
        
        .input-group { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 30px; 
        }
        
        input { 
            flex: 1; 
            padding: 16px; 
            background: var(--bg-offset); 
            border: 2px solid var(--border); 
            border-radius: 12px; 
            color: white; 
            outline: none; 
            font-size: 1.1em; 
            transition: 0.3s; 
        }
        
        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); 
        }
        
        button { 
            padding: 16px 28px; 
            background: var(--bg-offset); /* Dark background button */
            color: var(--primary);       /* Cyan glow text */
            border: 2px solid var(--primary); /* Glowing border */
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.2s;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }
        
        button:hover { 
            background: var(--primary);  /* Filled button on hover */
            color: var(--bg); 
            transform: translateY(-2px); 
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }
        
        #output { 
            display: none; 
            animation: slideUp 0.5s ease forwards; 
        }
        
        .section-title { 
            font-size: 0.85em; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: var(--sub-text); 
            margin: 25px 0 10px; 
            font-weight: 700; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 5px; 
        }
        
        .badge { 
            display: inline-block; 
            background: var(--secondary);  /* Deep grey badge */
            color: var(--primary);         /* Cyan glow text */
            padding: 5px 14px; 
            border-radius: 8px; 
            font-size: 0.75em; 
            font-weight: bold; 
            margin: 0 8px 8px 0; 
            text-transform: capitalize;
            border: 1px solid rgba(0, 229, 255, 0.1);
        }
        
        .step { 
            margin-bottom: 12px; 
            padding: 18px; 
            background: rgba(0, 0, 0, 0.2); 
            border-left: 6px solid var(--primary); /* Cyan glowing left border */
            border-radius: 0 12px 12px 0; 
            line-height: 1.6; 
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .evo-box { 
            background: rgba(0, 212, 255, 0.05); 
            border: 1px solid var(--evolution); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
        }
        
        .ev-box { 
            background: rgba(48, 53, 65, 0.2); 
            border: 1px solid var(--secondary); 
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px 0; 
        }
        
        .location-box { 
            background: var(--bg-offset); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px 0; 
        }
        
        .ref-links { 
            display: flex; 
            gap: 12px; 
            margin-top: 15px; 
            flex-wrap: wrap; 
        }
        
        .ref-btn { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            border-radius: 8px; 
            font-size: 0.8em; 
            text-decoration: none; 
            color: var(--text); 
            font-weight: bold; 
            transition: 0.2s; 
            border: 1px solid transparent; 
        }
        
        /* Expert References retain their unique, game-authentic colors */
        .serebii { background: #0e7a3a; } 
        .bulbapedia { background: #70379b; } 
        .pokemondb { background: #e05210; }
        
        .ref-btn:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        }
        
        .move-pill { 
            display: inline-block; 
            background: var(--bg-offset); 
            color: var(--primary); 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.8em; 
            margin: 3px; 
            border: 1px solid var(--border); 
            text-transform: capitalize; 
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéBreed Pro | Pivot Engine</title>
    <style>
        :root { 
            --bg: #030712; --card: #111827; --primary: #38bdf8; --accent: #818cf8; 
            --text: #f1f5f9; --sub-text: #94a3b8; --border: #1f2937; --highlight: #fbbf24;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1200px; width: 100%; animation: slideIn 0.6s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.05em; margin: 0; }
        .header p { color: var(--sub-text); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 5px; }

        /* SEARCH INTERFACE */
        .search-wrap { position: sticky; top: 20px; z-index: 1000; margin-bottom: 40px; }
        .input-box { display: flex; background: #000; border: 1px solid var(--border); border-radius: 14px; padding: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        input { flex: 1; background: transparent; border: none; padding: 12px 20px; color: #fff; font-size: 1.05rem; outline: none; }
        .btn-pivot { background: var(--primary); color: #000; border: none; padding: 0 32px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-pivot:hover { background: #7dd3fc; transform: scale(1.02); }

        /* GRID LAYOUT */
        #output { display: none; }
        .main-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 24px; }
        .label { color: var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 20px; display: block; }

        /* PIVOT MOVESET */
        .move-list { display: grid; gap: 12px; }
        .move-item { background: #1f2937; padding: 16px; border-radius: 12px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .move-item.pinned { border-left-color: var(--highlight); background: rgba(251, 191, 36, 0.05); }
        .move-name { font-weight: 700; font-size: 1rem; }
        .move-meta { font-size: 0.75rem; color: var(--sub-text); font-family: monospace; }
        .tag-pinned { font-size: 0.6rem; background: var(--highlight); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 8px; }

        /* STATS & GENEALOGY */
        .tree { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .node { background: #1e293b; padding: 6px 14px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; }
        .node.active { background: var(--primary); color: #000; }
        
        .stat-bar { margin-bottom: 14px; }
        .stat-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; }
        .bar-bg { height: 8px; background: #334155; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: width 1s ease-out; }

        /* MODAL */
        #errorOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: #fff; color: #000; padding: 40px; border: 8px solid #000; max-width: 500px; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

<div id="errorOverlay">
    <div class="modal">
        <h2 style="color:red; margin-top:0;">FIELD DATA ERROR</h2>
        <p id="errorMsg">Species or Move data is unrecognized. The National Dex remains unchanged by your errors. Correct them!</p>
        <button onclick="document.getElementById('errorOverlay').style.display='none'" style="background:#000; color:#fff; border:none; padding:12px 24px; cursor:pointer; font-weight:bold;">ACKNOWLEDGE</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>PokéBreed <span style="color:var(--primary)">Pivot Architect</span></h1>
        <p>Dynamic Move-Centric Strategic Engineering</p>
    </div>

    <div class="search-wrap">
        <div class="input-box">
            <input type="text" id="queryInput" placeholder="Enter Directive: 'Jolly Weavile with Ice Shard'" onkeypress="if(event.key === 'Enter') startPivot()">
            <button class="btn-pivot" onclick="startPivot()">Pivot Data</button>
        </div>
    </div>

    <div id="output">
        <div class="main-grid">
            <div class="col-left">
                <div class="card">
                    <span class="label">Evolutionary Genealogy</span>
                    <div id="evoDisplay" class="tree"></div>
                    <div id="founderOrigin" style="font-size: 0.9rem; color: var(--accent); font-weight: 600;"></div>
                </div>

                <div class="card">
                    <span class="label">Pivoted 4

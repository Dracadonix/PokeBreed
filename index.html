<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Master | Encyclopedia Edition</title>
    <style>
        :root { --primary: #ff1c1c; --secondary: #3b4cca; --bg: #0a0a0c; --card: #1e1e26; --text: #f0f0f0; --accent: #ffd700; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 850px; width: 100%; background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #333; }
        h1 { color: var(--primary); text-align: center; font-size: 2.2em; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { display: flex; gap: 10px; margin: 30px 0; }
        input { flex: 1; padding: 15px; background: #2d2d3a; border: 2px solid #3d3d4d; border-radius: 10px; color: white; outline: none; font-size: 1.1em; }
        button { padding: 15px 25px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #output { display: none; animation: fadeIn 0.4s ease; }
        .badge { display: inline-block; background: var(--secondary); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.8em; margin-right: 8px; margin-bottom: 5px; }
        .step { margin-bottom: 15px; padding: 15px; background: #262630; border-left: 5px solid var(--primary); border-radius: 0 10px 10px 0; }
        .location-box { background: #16161d; border: 1px dashed #555; padding: 15px; border-radius: 10px; margin: 20px 0; }
        .ref-links { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .ref-btn { flex: 1; padding: 8px; text-align: center; border-radius: 5px; font-size: 0.8em; text-decoration: none; color: white; font-weight: bold; transition: 0.2s; }
        .serebii { background: #08632d; } .bulbapedia { background: #612a8a; } .pokemondb { background: #cf4a10; }
        .ref-btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .move-pill { display: inline-block; background: #3d3d4d; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; margin: 2px; border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ PokeBreed Master</h1>
    <p style="text-align:center; opacity: 0.6;">Locations cross-referenced from Serebii, Bulbapedia, & PokemonDB.</p>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="e.g. 'How to get Gible in BDSP'">
        <button onclick="generateGuide()">Locate & Analyze</button>
    </div>

    <div id="output">
        <h2 id="pokeHeader" style="margin-bottom:10px; color:var(--primary);"></h2>
        <div id="metaInfo"></div>
        
        <div id="locationData" class="location-box">
            <strong>📍 Found In (Current Game):</strong>
            <div id="locationList" style="font-size: 0.9em; margin-top: 5px; color: #bbb;">Fetching game data...</div>
            <div class="ref-links">
                <a id="linkSerebii" class="ref-btn serebii" target="_blank">Serebii</a>
                <a id="linkBulba" class="ref-btn bulbapedia" target="_blank">Bulbapedia</a>
                <a id="linkDB" class="ref-btn pokemondb" target="_blank">PokemonDB</a>
            </div>
        </div>

        <div id="stepsList"></div>
        <div id="movepoolSection" class="niche-box" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    async function generateGuide() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const words = input.replace(/[?!.]/g, "").split(' ');
        
        // 1. Version Mapping
        const gameMap = { "bdsp": "brilliant-diamond-and-shining-pearl", "sv": "scarlet-violet", "swsh": "sword-shield", "sword": "sword", "shield": "shield" };
        const activeKey = Object.keys(gameMap).find(k => input.includes(k)) || "default";

        // 2. Identify Pokemon
        const excluded = ["how", "to", "get", "find", "where", "is", "breed", "in", "the", "a", "an", ...Object.keys(gameMap)];
        const potentialNames = words.filter(w => !excluded.includes(w) && w.length > 2);

        let data = null;
        for (let name of potentialNames) {
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                if (res.ok) { data = await res.json(); break; }
            } catch (e) { continue; }
        }

        if (!data) return alert("Pokemon not identified. Be specific!");

        document.getElementById('output').style.display = 'block';
        document.getElementById('pokeHeader').innerText = data.name.toUpperCase();

        // 3. CROSS-REFERENCE LINKS
        // Standardize names for URLs (e.g. 'vulpix-alola' -> 'vulpix')
        const baseName = data.name.split('-')[0];
        document.getElementById('linkSerebii').href = `https://www.serebii.net/pokedex-sv/${baseName}/`;
        document.getElementById('linkBulba').href = `https://bulbapedia.bulbagarden.net/wiki/${baseName}_(Pokémon)`;
        document.getElementById('linkDB').href = `https://pokemondb.net/pokedex/${baseName}`;

        // 4. FETCH LOCATIONS (PokeAPI)
        const locRes = await fetch(data.location_area_encounters);
        const locData = await locRes.json();
        
        let locHtml = "No specific wild spawns found in API for this game version. Check links below:";
        if (locData.length > 0) {
            // Filter by game if specified
            const relevant = activeKey !== "default" ? 
                locData.filter(l => l.version_details.some(v => v.version.name.includes(activeKey))) : 
                locData.slice(0, 3);
            
            if (relevant.length > 0) {
                locHtml = relevant.map(l => `• ${l.location_area.name.replace(/-/g, ' ').toUpperCase()}`).join('<br>');
            }
        }
        document.getElementById('locationList').innerHTML = locHtml;

        // 5. INSTRUCTIONS & MOVES
        let steps = [];
        const eggMoves = data.moves.filter(m => m.version_group_details.some(v => v.move_learn_method.name === 'egg')).map(m => m.move.name.replace('-', ' '));
        
        steps.push(`<strong>Breeding Note:</strong> Pair with a Ditto or compatible egg group parent.`);
        if (input.includes("iv")) steps.push(`<strong>Stats:</strong> Use a Destiny Knot to pass 5 IVs.`);
        
        document.getElementById('stepsList').innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');
        document.getElementById('movepoolSection').innerHTML = `<strong>Available Egg Moves:</strong><br>` + eggMoves.slice(0, 10).map(m => `<span class="move-pill">${m}</span>`).join('');
    }
</script>

</body>
</html>

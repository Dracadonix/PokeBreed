<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PokeBreed Pro | v400M Zenith</title>
    <style>
        :root { --void: #010204; --ring: #00f2ff; --sub: #64748b; --warn: #ff0055; --surface: rgba(15, 23, 42, 0.98); }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--void); color: #f1f5f9; margin: 0; padding: 25px; }
        
        /* LAYOUT */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; display: none; }
        .panel { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); padding: 30px; border-radius: 4px; }
        .tag { font-size: 9px; font-weight: 900; color: var(--ring); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; display: block; }
        
        /* GEAR STYLING */
        .gear-card { background: rgba(0,242,255,0.03); border: 1px solid rgba(0,242,255,0.1); padding: 15px; margin-bottom: 15px; }
        .gear-title { color: var(--ring); font-size: 11px; font-weight: 900; margin-bottom: 5px; }
        .alert { color: var(--warn); border-color: var(--warn); font-weight: 800; }

        /* SCROLLABLE TIMELINE */
        .timeline { height: 500px; overflow-y: auto; padding-right: 10px; }
        .move-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        .legacy { color: var(--warn); font-size: 8px; border: 1px solid var(--warn); padding: 1px 4px; border-radius: 2px; }

        input { width: 100%; background: #0b111e; border: 1px solid var(--ring); padding: 20px; color: var(--ring); font-size: 22px; outline: none; margin-bottom: 30px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<div style="max-width: 1500px; margin: 0 auto;">
    <header style="text-align: center; margin-bottom: 50px;">
        <span style="font-size: 10px; letter-spacing: 12px; color: var(--sub);">GENETIC VALIDATION v400,000,000.0</span>
        <h1 style="margin: 10px 0; font-weight: 200; letter-spacing: 15px;">OBSIDIAN <span style="color:var(--ring); font-weight: 900;">ZENITH</span></h1>
    </header>

    <input type="text" id="target" placeholder="DIRECTIVE (e.g. '0 Atk Timid Budew')" onkeypress="if(event.key==='Enter') execute()">

    <div id="ui" class="grid">
        <div class="panel">
            <span class="tag">01. Logistic Deployment</span>
            <div id="gearList"></div>
            <div id="incenseBox"></div>
        </div>

        <div class="panel">
            <span class="tag">02. Specimen Analytics</span>
            <h2 id="pName" style="font-size: 44px; margin: 0 0 20px 0; font-weight: 200;"></h2>
            <div id="statBox"></div>
            <div id="rowanPanel" style="margin-top: 25px; padding: 20px; border-left: 2px solid var(--warn); background: rgba(255,0,85,0.05); display: none;">
                <p id="rowanText" style="font-size: 13px; margin: 0;"></p>
            </div>
        </div>

        <div class="panel">
            <span class="tag">03. Developmental Timeline</span>
            <div class="timeline" id="movePool"></div>
            <p style="font-size: 10px; color: var(--sub); margin-top: 20px;">*LEGACY: This move is lost upon evolution. Do not evolve until learned.</p>
        </div>
    </div>
</div>

<script>
    const clean = (s) => s.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    const incenses = {
        'azurill': 'Sea Incense', 'wynaut': 'Lax Incense', 'budew': 'Rose Incense',
        'chingling': 'Pure Incense', 'bonsly': 'Rock Incense', 'mime-jr': 'Odd Incense',
        'happiny': 'Luck Incense', 'munchlax': 'Full Incense', 'mantyke': 'Wave Incense'
    };

    async function execute() {
        const q = document.getElementById('target').value.toLowerCase();
        const list = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1010').then(r=>r.json());
        const t = list.results.find(p => q.includes(p.name))?.name;
        if(!t) return;

        const p = await fetch(`https://pokeapi.co/api/v2/pokemon/${t}`).then(r=>r.json());
        document.getElementById('ui').style.display = 'grid';
        document.getElementById('pName').innerText = clean(t);

        // GEAR LOGIC
        const nature = q.match(/(modest|timid|adamant|jolly|bold|impish|calm|careful)/);
        let gear = `<div class="gear-card"><div class="gear-title">⛓️ DESTINY KNOT</div>Inherits 5 Stats from parents.</div>`;
        if(nature) gear += `<div class="gear-card"><div class="gear-title">💎 EVERSTONE</div>Locks <b>${clean(nature[0])}</b> nature.</div>`;
        if(q.includes('0')) gear += `<div class="gear-card"><div class="gear-title">⚡ POWER ITEM</div>Guarantees the "0" stat inheritance.</div>`;
        document.getElementById('gearList').innerHTML = gear;

        const inc = incenses[t];
        document.getElementById('incenseBox').innerHTML = inc ? `<div class="gear-card alert"><div class="gear-title">⚠️ ${inc.toUpperCase()} REQUIRED</div>Parent must hold this to produce ${clean(t)} egg.</div>` : '';

        // STATS & ROWAN
        document.getElementById('statBox').innerHTML = p.stats.map(s => `
            <div style="margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800;">
                    <span>${s.stat.name.toUpperCase()}</span><span>${s.base_stat}</span>
                </div>
                <div style="height:2px; background:rgba(255,255,255,0.05); margin-top:5px;"><div style="height:100%; background:var(--ring); width:${(s.base_stat/255)*100}%"></div></div>
            </div>`).join('');

        const rowan = document.getElementById('rowanPanel');
        if(nature && (nature[0] === 'adamant' || nature[0] === 'jolly') && p.stats[3].base_stat > p.stats[1].base_stat) {
            rowan.style.display = 'block';
            document.getElementById('rowanText').innerText = `Professor Rowan: You are wasting genetic potential by giving a Physical nature to a Special specialist.`;
        } else { rowan.style.display = 'none'; }

        // MOVE TIMELINE
        const moves = p.moves.map(m => ({name: m.move.name, lvl: m.version_group_details[0].level_learned_at})).sort((a,b)=>a.lvl-b.lvl);
        document.getElementById('movePool').innerHTML = moves.map(m => `
            <div class="move-row">
                <span><b>Lv.${m.lvl}</b> ${clean(m.name)}</span>
                ${m.lvl > 35 ? '<span class="legacy">LEGACY</span>' : ''}
            </div>`).join('');
    }
</script>
</body>
</html>

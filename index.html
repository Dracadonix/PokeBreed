<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Field Researcher Suite</title>
    <style>
        :root { 
            --bg: #010204; --card: #0d1117; --primary: #00e5ff; --accent: #ff00ff; 
            --text: #f0f4f8; --sub-text: #64748b; --border: #30363d; --rowan: #ff0000;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }

        .container { max-width: 1400px; width: 100%; margin-top: 10px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        /* SEARCH ENGINE */
        .input-wrap { display: flex; gap: 10px; background: #000; padding: 10px; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        input { flex: 1; background: transparent; border: none; padding: 15px; color: #fff; font-size: 1.1rem; outline: none; }
        .btn-run { background: var(--primary); color: #000; border: none; padding: 0 35px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* DATA ARCHITECTURE */
        #output { display: none; }
        .layout { display: grid; grid-template-columns: 1fr 450px; gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; position: relative; }
        .h-tag { color: var(--primary); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; border-bottom: 1px solid #30363d; padding-bottom: 5px; }

        /* EVOLUTION TREE */
        .tree-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .tree-node { background: #161b22; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem; text-transform: capitalize; }
        .tree-arrow { color: var(--sub-text); font-weight: bold; }
        .current-node { border-color: var(--primary); color: var(--primary); font-weight: bold; box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); }

        /* STAT BARS */
        .stat-container { margin-bottom: 10px; }
        .stat-label { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .stat-bar-bg { width: 100%; height: 6px; background: #161b22; border-radius: 3px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--primary); transition: width 1s ease-in-out; }

        .location-box { background: #1a1f26; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); margin-top: 10px; font-size: 0.9rem; }

        /* ROWAN'S TEMPER */
        #rowanBox {
            display: none; position: fixed; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 750px; background: #fff; color: #000; padding: 30px;
            border: 10px double #000; z-index: 10000; font-family: 'Courier New', monospace;
        }
        .shaking { animation: rumble 0.1s infinite; }
        @keyframes rumble { 0% { transform: translate(-50.5%, 0.5%); } 50% { transform: translate(-49.5%, -0.5%); } 100% { transform: translate(-50%, 0); } }
    </style>
</head>
<body>

<div id="rowanBox">
    <div style="font-weight:900; color:red; border-bottom:2px solid #000; margin-bottom:10px;">PROF. ROWAN: FIELD REPORT AUDIT</div>
    <div id="rowanMsg">...</div>
    <button style="float:right; margin-top:15px; padding:10px 20px; background: #000; color:#fff;" onclick="document.getElementById('rowanBox').style.display='none'">ACKNOWLEDGE</button>
</div>

<div class="container">
    <div class="header">
        <h1>POKEBREED <span style="color:var(--primary)">FIELD ARCHITECT</span></h1>
        <p style="color:var(--sub-text);">V13.0 // Distribution, Genealogy, & Statistical Analysis</p>
    </div>

    <div class="input-wrap">
        <input type="text" id="userInput" placeholder="Search: 'Jolly Weavile'" onkeypress="if(event.key === 'Enter') architectFinal()">
        <button class="btn-run" onclick="architectFinal()">Analyze Field Data</button>
    </div>

    <div id="output">
        <div class="layout">
            <div class="col-left">
                <div class="card">
                    <span class="h-tag">Evolutionary Genealogy</span>
                    <div id="evoTree" class="tree-container"></div>
                </div>

                <div class="card">
                    <span class="h-tag">Subject Identification & Best Moves</span>
                    <h2 id="pName" style="text-transform:capitalize; font-size:2.8rem; margin:0; color:var(--primary)"></h2>
                    <div id="pTypes" style="margin-top:5px; margin-bottom:20px;"></div>
                    <div id="bestKit"></div>
                </div>
                
                <div class="card">
                    <span class="h-tag">Wild Habitat (Base Form)</span>
                    <div id="locationData" class="location-box">Scanning Biotope Data...</div>
                </div>
            </div>

            <div class="col-right">
                <div class="card">
                    <span class="h-tag">Base Stat Analytics</span>
                    <div id="statBars"></div>
                </div>

                <div class="card">
                    <span class="h-tag">Breeding Growth Curve</span>
                    <div id="roadmap" style="font-size:0.85rem; line-height: 1.8;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let pLib = [];
    fetch('https://pokeapi.co/api/v2/pokemon?limit=2000').then(r => r.json()).then(d => pLib = d.results.map(p => p.name));

    async function architectFinal() {
        const raw = document.getElementById('userInput').value.toLowerCase();
        const target = pLib.find(name => raw.includes(name)) || "weavile";

        try {
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${target}`);
            const d = await r.json();
            const sR = await fetch(d.species.url);
            const sD = await sR.json();

            document.getElementById('output').style.display = 'block';
            document.getElementById('pName').innerText = d.name;
            document.getElementById('pTypes').innerHTML = d.types.map(t => `<span style="color:var(--primary); font-weight:800; margin-right:15px;">${t.type.name.toUpperCase()}</span>`).join('');

            // --- 1. EVOLUTION TREE ---
            const eR = await fetch(sD.evolution_chain.url);
            const eD = await eR.json();
            let tree = [];
            let curr = eD.chain;
            while(curr) {
                tree.push(curr.species.name);
                curr = curr.evolves_to[0];
            }
            document.getElementById('evoTree').innerHTML = tree.map(name => 
                `<span class="tree-node ${name === d.name || name === sD.name ? 'current-node' : ''}">${name}</span>`
            ).join('<span class="tree-arrow">→</span>');

            // --- 2. LOCATION DATA (BASE FORM) ---
            const baseFormName = tree[0];
            const locR = await fetch(`https://pokeapi.co/api/v2/pokemon/${baseFormName}/encounters`);
            const locD = await locR.json();
            let locHTML = `<strong>Founder Location (${baseFormName.toUpperCase()}):</strong><br>`;
            if(locD.length > 0) {
                locHTML += locD.slice(0, 2).map(l => l.location_area.name.replace(/-/g, ' ')).join(', ');
            } else {
                locHTML += "Common in snowy/temperate peaks or via Breeding.";
            }
            document.getElementById('locationData').innerHTML = locHTML;

            // --- 3. STAT BARS ---
            document.getElementById('statBars').innerHTML = d.stats.map(s => {
                const percent = (s.base_stat / 255) * 100;
                return `
                <div class="stat-container">
                    <div class="stat-label"><span>${s.stat.name.replace('-', ' ')}</span><span>${s.base_stat}</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${percent}%"></div></div>
                </div>`;
            }).join('');

            // --- 4. TACTICAL KIT ---
            const movePromises = d.moves.slice(0, 15).map(m => fetch(m.move.url).then(res => res.json()));
            const moveDetails = await Promise.all(movePromises);
            let kitHTML = "";
            moveDetails.filter(m => m.power).sort((a,b) => b.power - a.power).slice(0, 3).forEach(m => {
                kitHTML += `<div style="background:#161b22; padding:10px; border-radius:8px; margin-bottom:5px; font-size:0.8rem;">
                    <strong>${m.name.replace(/-/g, ' ')}</strong> | ${m.power} BP | ${m.damage_class.name.toUpperCase()}
                </div>`;
            });
            document.getElementById('bestKit').innerHTML = kitHTML;

            // --- 5. GROWTH ROADMAP ---
            document.getElementById('roadmap').innerHTML = `
                • <strong>Hatch Cycles:</strong> ${sD.hatch_counter}<br>
                • <strong>Base Form:</strong> ${baseFormName.toUpperCase()}<br>
                • <strong>Requirement:</strong> Everstone + Destiny Knot.
            `;

        } catch (e) {
            const rb = document.getElementById('rowanBox');
            rb.style.display = 'block';
            rb.classList.add('shaking');
            document.getElementById('rowanMsg').innerText = "DATA CORRUPTION! I cannot locate a species with that designation. Consult your Pokédex immediately!!";
            setTimeout(() => rb.classList.remove('shaking'), 3000);
        }
    }
</script>
</body>
</html>

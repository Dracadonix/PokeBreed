<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Grand Curriculum</title>
    <style>
        :root { 
            --bg: #010204; --card: #0d1117; --primary: #00e5ff; --accent: #ff00ff; 
            --text: #f0f4f8; --sub-text: #64748b; --border: #30363d; --rowan: #ff0000;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }

        .container { max-width: 1300px; width: 100%; margin-top: 10px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        /* SEARCH ENGINE */
        .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg); padding-bottom: 20px; }
        .input-wrap { display: flex; gap: 10px; background: #000; padding: 10px; border: 2px solid var(--primary); border-radius: 12px; }
        input { flex: 1; background: transparent; border: none; padding: 15px; color: #fff; font-size: 1.1rem; outline: none; }
        .btn-run { background: var(--primary); color: #000; border: none; padding: 0 35px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* DATA ARCHITECTURE */
        #output { display: none; }
        .layout { display: grid; grid-template-columns: 1fr 450px; gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .h-tag { color: var(--primary); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; border-bottom: 1px solid #30363d; padding-bottom: 5px; }

        /* PROGRESSION TIMELINE */
        .milestone { position: relative; padding-left: 30px; border-left: 2px solid #30363d; margin-bottom: 20px; }
        .milestone::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .m-lvl { font-weight: 900; color: var(--accent); margin-right: 10px; }
        
        .move-kit { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .pill { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: #161b22; border: 1px solid var(--border); }
        .p-rec { border-color: var(--primary); color: var(--primary); }

        /* ROWAN'S TEMPER */
        #rowanBox {
            display: none; position: fixed; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 750px; background: #fff; color: #000; padding: 30px;
            border: 10px double #000; z-index: 10000; font-family: 'Courier New', monospace;
        }
        .shaking { animation: rumble 0.1s infinite; }
        @keyframes rumble { 0% { transform: translate(-50.5%, 0.5%); } 50% { transform: translate(-49.5%, -0.5%); } 100% { transform: translate(-50%, 0); } }
    </style>
</head>
<body>

<div id="rowanBox">
    <div style="font-weight:900; color:red; border-bottom:2px solid #000; margin-bottom:10px;">SINNOH LAB: CRITICAL ERROR</div>
    <div id="rowanMsg">...</div>
    <button style="float:right; margin-top:15px; padding:10px 20px; background: #000; color:#fff;" onclick="document.getElementById('rowanBox').style.display='none'">ACKNOWLEDGE</button>
</div>

<div class="container">
    <div class="header">
        <h1>POKEBREED <span style="color:var(--primary)">GRAND CURRICULUM</span></h1>
        <p style="color:var(--sub-text); letter-spacing: 2px;">End-to-End Leveling & Move Progression v10.0</p>
    </div>

    <div class="search-container">
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Search: '5iv Jolly Weavile with Ice Shard'" onkeypress="if(event.key === 'Enter') architectGrand()">
            <button class="btn-run" onclick="architectGrand()">Architect Plan</button>
        </div>
    </div>

    <div id="output">
        <div class="layout">
            <div class="col-left">
                <div class="card">
                    <span class="h-tag">Subject Identification</span>
                    <h2 id="pName" style="text-transform:capitalize; font-size:3rem; margin:0; color:var(--primary)"></h2>
                    <div id="pTypes" style="margin-top:10px;"></div>
                </div>

                <div class="card">
                    <span class="h-tag">Master Leveling Progression</span>
                    <div id="progression"></div>
                </div>
            </div>

            <div class="col-right">
                <div class="card">
                    <span class="h-tag">Recommended Competitive Kit</span>
                    <div id="recommendedKit" class="move-kit"></div>
                    <p style="font-size:0.75rem; color:var(--sub-text); margin-top:15px;">*Kit based on Nature and Species Tiering.</p>
                </div>

                <div class="card">
                    <span class="h-tag">Evolutionary Protocol</span>
                    <div id="evoSteps" style="font-size:0.95rem; line-height:1.6;"></div>
                </div>

                <div class="card">
                    <span class="h-tag">Breeding Checklist</span>
                    <div id="breedingList" style="font-size:0.85rem;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let pLib = [];
    fetch('https://pokeapi.co/api/v2/pokemon?limit=2000').then(r => r.json()).then(d => pLib = d.results.map(p => p.name));

    async function architectGrand() {
        const raw = document.getElementById('userInput').value.toLowerCase();
        const target = pLib.find(name => raw.includes(name)) || raw.split(' ').find(w => w.length > 3 && !["with","5iv","jolly"].includes(w));

        try {
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${target}`);
            if(!r.ok) throw new Error();
            const d = await r.json();
            const sR = await fetch(d.species.url);
            const sD = await sR.json();

            document.getElementById('output').style.display = 'block';
            document.getElementById('pName').innerText = d.name;
            document.getElementById('pTypes').innerHTML = d.types.map(t => `<span class="pill" style="color:var(--primary)">${t.type.name.toUpperCase()}</span>`).join('');

            // --- PROGRESSION PLOTTER ---
            const levelMoves = d.moves
                .filter(m => m.version_group_details[0].move_learn_method.name === 'level-up')
                .map(m => ({ name: m.move.name.replace(/-/g, ' '), lvl: m.version_group_details[0].level_learned_at }))
                .sort((a,b) => a.lvl - b.lvl);

            let progHTML = `<div class="milestone"><span class="m-lvl">LVL 01</span> Hatch <span style="color:var(--primary)">${sD.name.toUpperCase()}</span>. (Inherit Egg Moves now).</div>`;
            
            // Major Milestones (Every 15-20 levels or key moves)
            const milestones = levelMoves.filter((m, i) => m.lvl > 1 && (i % 4 === 0 || m.lvl > 40));
            milestones.forEach(m => {
                progHTML += `<div class="milestone"><span class="m-lvl">LVL ${m.lvl.toString().padStart(2, '0')}</span> Learns <strong style="text-transform:capitalize">${m.name}</strong>.</div>`;
            });
            progHTML += `<div class="milestone" style="border:none;"><span class="m-lvl">LVL 50+</span> Final Competitive Training & Hyper Training.</div>`;
            document.getElementById('progression').innerHTML = progHTML;

            // --- RECOMMENDED KIT ---
            // Logic: Pick the 4 highest power moves from level-up + search context
            const highPower = levelMoves.slice(-4).reverse();
            let kitHTML = highPower.map(m => `<div class="pill p-rec" style="text-transform:capitalize">${m.name}</div>`).join('');
            if(raw.includes("ice shard")) kitHTML = `<div class="pill p-rec">Ice Shard (Egg)</div>` + kitHTML;
            document.getElementById('recommendedKit').innerHTML = kitHTML;

            // --- EVO PROTOCOL ---
            let evo = "Standard Level-up evolution detected.";
            if(d.name.includes("weavile")) evo = "1. Obtain <strong>Razor Claw</strong>.<br>2. Wait for <strong>Nighttime</strong>.<br>3. Level up Sneasel once.";
            if(d.name.includes("lucario")) evo = "1. Max <strong>Friendship</strong>.<br>2. Level up during the <strong>Day</strong>.";
            document.getElementById('evoSteps').innerHTML = evo;

            // --- BREEDING CHECKLIST ---
            document.getElementById('breedingList').innerHTML = `
                • Nature: <span style="color:var(--accent)">${raw.includes("jolly") ? "Jolly (Locked)" : "Check Search"}</span><br>
                • Item: <strong>Destiny Knot</strong> (IV Pass)<br>
                • Item: <strong>Everstone</strong> (Nature Lock)<br>
                • Step Count: ~${sD.hatch_counter * 255}
            `;

        } catch (e) {
            const rb = document.getElementById('rowanBox');
            rb.style.display = 'block';
            rb.classList.add('shaking');
            document.getElementById('rowanMsg').innerText = "UNRELIABLE DATA! Your notes are a mess! How am I supposed to analyze a Pokémon I've never heard of?! Check your spelling!!";
            setTimeout(() => rb.classList.remove('shaking'), 3000);
        }
    }
</script>
</body>
</html>

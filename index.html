<script>
/* =========================
   🧬 CORE MONOLITH ENGINE (RESTORED)
========================= */

const $ = id => document.getElementById(id);

/* ---------- STATE ---------- */
const STATE = {
    cache: new Map()
};

/* ---------- CONSTANTS ---------- */
const COLORS = {
    hp:'#4ade80',
    attack:'#facc15',
    defense:'#fb923c',
    'special-attack':'#60a5fa',
    'special-defense':'#a78bfa',
    speed:'#f472b6'
};

const INCENSES = {
    snorlax:'FULL',
    roselia:'ROSE',
    marill:'SEA',
    wobbuffet:'LAX',
    'mr-mime':'ODD',
    mantine:'WAVE',
    sudowoodo:'ROCK'
};

/* ---------- UTIL ---------- */
const rand = arr => arr[Math.floor(Math.random()*arr.length)];

async function fetchJSON(url){
    if(STATE.cache.has(url)) return STATE.cache.get(url);

    try{
        const r = await fetch(url);
        const d = await r.json();
        STATE.cache.set(url,d);
        return d;
    }catch{
        return null;
    }
}

/* =========================
   👑 PROFESSOR ENGINE (RESTORED DEPTH)
========================= */
const QUOTES = {
    oak:{
        s:["Genetics is the backbone of strategy","Every IV tells a story","Precision defines champions"],
        g:["OAK: I miss field research...","OAK: These kids and their sandwiches..."]
    },
    elm:{
        s:["Eggs are compressed potential","Johto still leads research","Hatch cycles define evolution"],
        g:["ELM: I haven't slept in days...","ELM: Where are my incubators?"]
    },
    birch:{
        s:["Nature is unpredictable but measurable","Field data beats theory","Wild habitats shape perfection"],
        g:["BIRCH: I lost another Pokéball...","BIRCH: Too many Poochyena again..."]
    },
    rowan:{
        s:["Efficiency is truth","0 IV is intentional design","Stat control defines mastery"],
        g:["ROWAN: This is inefficient...","ROWAN: Where is my notebook?"]
    }
};

function refreshProfs(){
    ['oak','elm','birch','rowan'].forEach(p=>{
        const el=$(p);
        const q=QUOTES[p];

        el.querySelector('.speech').innerText =
            `"${rand(q.s)}"`;

        el.querySelector('.grumble').innerText =
            rand(q.g);
    });
}

/* =========================
   🔬 EVOLUTION ENGINE (RESTORED FULL CHAIN)
========================= */
function buildEvo(chain){
    const out=[];
    let c=chain;

    while(c){
        out.push(c.species.name.toUpperCase());
        c=c.evolves_to[0];
    }

    return out.join(" → ");
}

/* =========================
   📊 STAT ENGINE (RESTORED + ROLE LOGIC)
========================= */
function analyzeStats(stats){
    const atk=stats[1].base_stat;
    const spa=stats[3].base_stat;
    const spe=stats[5].base_stat;

    const special=spa>atk;

    let role="";
    if(spe>=100 && special) role="Fast Special Attacker";
    else if(spe>=100) role="Fast Physical Attacker";
    else if(special) role="Bulky Special Attacker";
    else role="Bulky Physical Attacker";

    return {role,special};
}

function renderStats(stats){
    return stats.map(s=>`
        <div>
            <div class="stat-meta">
                <span>${s.stat.name.toUpperCase()}</span>
                <span>${s.base_stat}</span>
            </div>
            <div class="bar-outer">
                <div class="bar-inner"
                     style="width:${(s.base_stat/255)*100}%;
                     background:${COLORS[s.stat.name]}"></div>
            </div>
        </div>
    `).join('');
}

/* =========================
   🎯 MOVE ENGINE (RESTORED CLASSIFICATION)
========================= */
function renderMoves(moves){
    return moves.slice(0,80).map(m=>{
        const method=m.version_group_details[0]?.move_learn_method.name;

        let tag="LVL";
        let color="#64748b";

        if(method==="egg"){tag="EGG";color="#f472b6";}
        if(method==="machine"){tag="TM";color="#60a5fa";}

        return `
            <div class="move-item">
                <span>${m.move.name.toUpperCase()}</span>
                <span style="color:${color}">${tag}</span>
            </div>
        `;
    }).join('');
}

/* =========================
   ⚡ MAIN ANALYSIS PIPELINE (RESTORED FULL FLOW)
========================= */
async function start(){
    const name=$('pokeInput').value.toLowerCase();

    const p=await fetchJSON(`https://pokeapi.co/api/v2/pokemon/${name}`);
    if(!p) return alert("SPECIES NOT FOUND");

    const sp=await fetchJSON(p.species.url);
    const evo=await fetchJSON(sp.evolution_chain.url);

    refreshProfs();

    /* incense system restored */
    const inc=INCENSES[p.name];
    $('bio').innerHTML=`
        ${inc?`⚠ REQUIRES ${inc} INCENSE<br><br>`:""}
        <b>Egg Groups:</b> ${sp.egg_groups.map(g=>g.name.toUpperCase()).join(" | ")}<br>
        <b>Hatch:</b> ${sp.hatch_counter} cycles
    `;

    const analysis=analyzeStats(p.stats);

    $('moves').innerHTML=renderMoves(p.moves);

    $('bio').innerHTML+=`
        <br><br>
        <b>ROLE:</b> ${analysis.role}<br>
        <b>BREEDING NOTE:</b> ${analysis.special ? "0 ATK IV recommended" : "Max ATK IV recommended"}<br>
        <b>STRATEGY:</b> Destiny Knot + Everstone optimization
    `;
}

/* =========================
   📚 BIBLE SYSTEM (RESTORED STRUCTURE)
========================= */
function showTab(tab){
    $('home').style.display = tab==="home"?"block":"none";
    $('bible').style.display = tab==="bible"?"block":"none";
}

/* INIT */
window.onload=refreshProfs;
</script>

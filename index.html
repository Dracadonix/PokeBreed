<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pokémon Lab</title>
    <style>
        :root { 
            --bg: #f0f9ff; --card: #ffffff; --primary: #0ea5e9; --text: #0f172a;
            --sub: #64748b; --lime: #22c55e; --warn: #ef4444; --border: #e2e8f0;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { max-width: 900px; width: 100%; }
        
        /* THE TEACHER'S DESK (LAB BENCH) */
        .bench { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .slot { background: #fff; border: 2px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .slot.active { border-color: var(--primary); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2); }
        .slot-title { font-size: 0.7rem; color: var(--sub); font-weight: bold; text-transform: uppercase; }
        .slot-name { font-weight: bold; font-size: 0.9rem; display: block; }

        /* SIMPLE SEARCH */
        .search-box { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; gap: 10px; margin-bottom: 30px; border: 2px solid #fff; }
        .search-box:focus-within { border-color: var(--primary); }
        input { flex: 1; border: none; outline: none; font-size: 1.1rem; padding-left: 10px; }
        button { background: var(--primary); color: #fff; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* THE ROWAN SLAM */
        @keyframes slam { 0% { transform: scale(1); } 20% { transform: translateY(10px); } 40% { transform: rotate(1deg); } 100% { transform: translate(0); } }
        .rage-alert { animation: slam 0.3s ease; border: 3px solid var(--warn) !important; background: #fef2f2 !important; color: var(--warn); padding: 20px; border-radius: 15px; font-weight: bold; margin-bottom: 20px; }

        /* CARDS */
        .layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .layout { grid-template-columns: 1.5fr 1fr; } }
        .card { background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid var(--border); position: relative; }
        .card-tag { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; display: block; }

        /* STAT BARS FOR KIDS */
        .stat-line { margin-bottom: 12px; }
        .bar-bg { height: 10px; background: #f1f5f9; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; border-radius: 5px; }

        /* HELP BUTTON */
        .help-tip { font-size: 0.75rem; color: var(--sub); background: #f8fafc; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 3px solid var(--primary); }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="margin:0; color: var(--primary);">Pokémon Helper</h1>
        <p style="color: var(--sub); font-weight: 500;">Type a Pokémon name below to start your project!</p>
    </div>

    <div class="bench" id="bench">
        <div class="slot" id="s0" onclick="swap(0)"><span class="slot-title">Folder 1</span><span class="slot-name" id="n0">Empty</span></div>
        <div class="slot" id="s1" onclick="swap(1)"><span class="slot-title">Folder 2</span><span class="slot-name" id="n1">Empty</span></div>
        <div class="slot" id="s2" onclick="swap(2)"><span class="slot-title">Folder 3</span><span class="slot-name" id="n2">Empty</span></div>
        <div class="slot" id="s3" onclick="swap(3)"><span class="slot-title">Folder 4</span><span class="slot-name" id="n3">Empty</span></div>
    </div>

    <div class="search-box">
        <input type="text" id="inp" placeholder="Try 'Pikachu' or 'Charizard'...">
        <button onclick="go()">Find Pokémon</button>
    </div>

    <div id="output" style="display:none;">
        <div id="rage"></div>
        <div class="layout">
            <div class="main">
                <div class="card">
                    <span class="card-tag">Meet Your Pokémon</span>
                    <h2 id="nameDisplay" style="margin:0 0 10px 0;"></h2>
                    <p id="bio" style="line-height:1.6; color: #475569;"></p>
                    <div class="help-tip"><strong>💡 Pro Tip:</strong> This Pokémon belongs to a family! Their path is: <span id="family" style="color:var(--primary); font-weight:bold;"></span></div>
                </div>
                <div class="card" style="margin-top:20px;">
                    <span class="card-tag">Best Moves</span>
                    <div id="moves"></div>
                </div>
            </div>
            <div class="side">
                <div class="card">
                    <span class="card-tag">Natural Talents</span>
                    <div id="stats"></div>
                    <div class="help-tip" style="margin-top:20px;">The longer the bar, the better they are at that skill!</div>
                </div>
                <button onclick="save()" style="width:100%; margin-top:20px; background:var(--lime); color:#fff; padding:15px; border-radius:15px; border:none; font-weight:bold; cursor:pointer;">Save to My Folders</button>
            </div>
        </div>
    </div>
</div>

<script>
    let activeFolder = 0; let currentData = null;
    const clean = (s) => s.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

    function init() {
        for(let i=0; i<4; i++) {
            const saved = localStorage.getItem('pokedex_v10_'+i);
            if(saved) document.getElementById('n'+i).innerText = JSON.parse(saved).name;
        }
        swap(0);
    }

    function swap(i) {
        activeFolder = i;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+i).classList.add('active');
        const saved = localStorage.getItem('pokedex_v10_'+i);
        if(saved) render(JSON.parse(saved));
        else document.getElementById('output').style.display = 'none';
    }

    function save() {
        if(!currentData) return;
        localStorage.setItem('pokedex_v10_'+activeFolder, JSON.stringify(currentData));
        document.getElementById('n'+activeFolder).innerText = currentData.name;
    }

    async function go() {
        const query = document.getElementById('inp').value.toLowerCase();
        const list = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1000').then(r=>r.json());
        const target = list.results.find(p => query.includes(p.name))?.name;
        
        if(!target) return alert("Hmm, I couldn't find that Pokémon. Check the spelling!");

        const [p, sp] = await Promise.all([
            fetch(`https://pokeapi.co/api/v2/pokemon/${target}`).then(r=>r.json()),
            fetch(`https://pokeapi.co/api/v2/pokemon-species/${target}`).then(r=>r.json())
        ]);

        const eR = await fetch(sp.evolution_chain.url).then(r=>r.json());
        let family = []; let c = eR.chain; while(c){ family.push(c.species.name); c = c.evolves_to[0]; }

        const story = sp.flavor_text_entries.find(e => e.language.name === 'en').flavor_text.replace(/\f/g, ' ');
        const moves = await Promise.all(p.moves.slice(0, 4).map(m => fetch(m.move.url).then(r=>r.json())));

        // THE SECRET ROWAN RAGE (v10,000)
        let rowanText = "";
        const natureWords = ["jolly", "adamant", "modest", "timid"];
        const natureInQuery = natureWords.find(w => query.includes(w));
        
        // This is where he crashes out if a beginner tries to do something "silly"
        if(natureInQuery === "jolly" && p.stats[3].base_stat > p.stats[1].base_stat) {
            rowanText = "WAIT! I CAN'T WATCH THIS! You're giving a JOLLY personality to a Pokémon that uses Special magic? That's like giving a swimsuit to someone going to the North Pole! DO IT RIGHT!";
        }

        currentData = { name: clean(target), family, stats: p.stats, moves, story, rowan: rowanText };
        render(currentData);
    }

    function render(d) {
        document.getElementById('output').style.display = 'block';
        const rBox = document.getElementById('rage');
        rBox.innerHTML = d.rowan ? `<div class="rage-alert">${d.rowan}</div>` : "";
        
        document.getElementById('nameDisplay').innerText = d.name;
        document.getElementById('bio').innerText = d.story;
        document.getElementById('family').innerText = d.family.map(n => clean(n)).join(' → ');

        document.getElementById('moves').innerHTML = d.moves.map(m => `
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <strong>${clean(m.name)}</strong> <span>Power: ${m.power || '??'}</span>
            </div>`).join('');

        const statMap = {
            'hp': 'Health', 'attack': 'Physical Strength', 'defense': 'Physical Armor',
            'special-attack': 'Magic Strength', 'special-defense': 'Magic Armor', 'speed': 'Quickness'
        };

        document.getElementById('stats').innerHTML = d.stats.map(st => {
            const color = st.base_stat > 100 ? '#22c55e' : (st.base_stat > 60 ? '#38bdf8' : '#f59e0b');
            return `
            <div class="stat-line">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem;">
                    <strong>${statMap[st.stat.name]}</strong> <span>${st.base_stat}</span>
                </div>
                <div class="bar-bg"><div class="bar-fill" style="width:${(st.base_stat/200)*100}%; background:${color};"></div></div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>

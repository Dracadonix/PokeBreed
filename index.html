<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Competitive Streamliner</title>
    <style>
        :root { --primary: #ff1c1c; --secondary: #3b4cca; --bg: #0a0a0c; --card: #1e1e26; --text: #f0f0f0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); text-align: center; font-size: 2.5em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { display: flex; gap: 10px; margin: 30px 0; }
        input { flex: 1; padding: 15px; background: #2d2d3a; border: 2px solid #3d3d4d; border-radius: 10px; color: white; outline: none; font-size: 1em; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,28,28,0.3); }
        button { padding: 15px 25px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #d11515; transform: translateY(-2px); }
        #output { display: none; animation: fadeIn 0.5s ease; }
        .badge { display: inline-block; background: var(--secondary); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.8em; margin-right: 8px; }
        .step { margin-bottom: 20px; padding: 15px; background: #2d2d3a; border-left: 5px solid var(--primary); border-radius: 0 10px 10px 0; }
        .niche-box { background: rgba(59, 76, 202, 0.1); border: 1px solid var(--secondary); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .niche-title { color: var(--secondary); font-weight: bold; font-size: 0.9em; text-transform: uppercase; margin-bottom: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<div class="container">
    <h1>⚡ PokeBreed Pro</h1>
    <p style="text-align:center; opacity: 0.7;">Identify Target Species, Nature, IVs, and Niche Traits.</p>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="e.g. 'Jolly 6IV HA Garchomp with Outrage'">
        <button onclick="generateGuide()">Analyze</button>
    </div>

    <div id="output">
        <h2 id="pokeHeader"></h2>
        <div id="metaInfo" style="margin-bottom: 20px;"></div>
        <div id="stepsList"></div>
        <div id="nicheSection" class="niche-box"></div>
    </div>
</div>

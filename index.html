<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Streamliner</title>
    <style>
        :root { --primary: #ff1c1c; --secondary: #3b4cca; --bg: #f4f4f9; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background: var(--secondary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #output { line-height: 1.6; border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .badge { display: inline-block; background: #eef; color: var(--secondary); padding: 2px 10px; border-radius: 20px; font-size: 0.85em; font-weight: bold; margin-right: 5px; margin-bottom: 5px; }
        .step { margin-bottom: 15px; padding: 10px; border-left: 4px solid var(--primary); background: #fffcfc; border-radius: 0 8px 8px 0; }
        .loading { text-align: center; font-style: italic; color: #888; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ PokeBreed</h1>
    <p style="text-align:center">Type naturally: <em>"I want a Jolly 6IV Garchomp"</em></p>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="What's your goal?">
        <button onclick="generateGuide()">Generate Plan</button>
    </div>
    <div id="loader" class="loading">Searching the Pokédex...</div>

    <div id="output">
        <h2 id="pokeName"></h2>
        <div id="eggGroups"></div>
        <hr>
        <div id="stepsList"></div>
    </div>
</div>

<script>
    async function generateGuide() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const outputDiv = document.getElementById('output');
        const loader = document.getElementById('loader');
        const stepsList = document.getElementById('stepsList');
        
        outputDiv.style.display = 'none';
        loader.style.display = 'block';

        // SMARTER EXTRACTION: 
        // 1. Remove common "filler" words
        // 2. The remaining words are checked against the API
        const filler = ["i", "want", "to", "breed", "a", "an", "with", "5iv", "6iv", "how", "do", "get", "perfect", "jolly", "timid", "adamant", "modest", "bold", "calm", "careful", "impish"];
        const words = input.replace(/[?!.]/g, "").split(' ').filter(w => !filler.includes(w) && w.length > 2);
        
        let foundData = null;
        let foundName = "";

        // Loop through remaining words to find the one that is a real Pokemon
        for (let word of words) {
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${word}`);
                if (response.ok) {
                    foundData = await response.json();
                    foundName = word;
                    break;
                }
            } catch (e) { continue; }
        }

        if (!foundData) {
            loader.style.display = 'none';
            return alert("Could not identify the Pokémon name. Try typing it clearly!");
        }

        try {
            const speciesResp = await fetch(foundData.species.url);
            const speciesData = await speciesResp.json();

            loader.style.display = 'none';
            outputDiv.style.display = 'block';
            document.getElementById('pokeName').innerText = `Plan for ${foundData.name.toUpperCase()}`;
            
            const groups = speciesData.egg_groups.map(g => `<span class="badge">${g.name.toUpperCase()}</span>`).join('');
            document.getElementById('eggGroups').innerHTML = `<strong>Egg Groups:</strong> ${groups}`;

            let steps = [];

            // Nature Detection
            const natures = ["jolly", "timid", "adamant", "modest", "bold", "calm", "careful", "impish"];
            const natureNeeded = natures.find(n => input.includes(n));
            if (natureNeeded) {
                steps.push(`<strong>Lock Nature:</strong> Give an <strong>Everstone</strong> to a <strong>${natureNeeded}</strong> parent.`);
            }

            // IV Detection
            if (input.includes("iv") || input.includes("perfect") || input.includes("stats")) {
                steps.push("<strong>Max Stats:</strong> Give a <strong>Destiny Knot</strong> to the parent with the best IVs to pass down 5 stats.");
            }

            // Egg Move Check
            const eggMoves = foundData.moves
                .filter(m => m.version_group_details.some(v => v.move_learn_method.name === 'egg'))
                .map(m => m.move.name.replace('-', ' '));
            
            const moveRequested = eggMoves.find(m => input.includes(m));
            if (moveRequested) {
                steps.push(`<strong>Move Inheritance:</strong> To get <strong>${moveRequested}</strong>, the male parent must know this move.`);
            }

            steps.push(`<strong>Parenting:</strong> Pair your ${foundData.name} with a Ditto or a male from the ${speciesData.egg_groups[0].name} group.`);
            steps.push("<strong>Efficiency:</strong> Put a Pokémon with <strong>Flame Body</strong> in your first party slot to hatch eggs 2x faster.");

            stepsList.innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');

        } catch (error) {
            loader.style.display = 'none';
            alert("Error fetching detailed data.");
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Full Strategy</title>
    <style>
        :root { --bg: #0f1014; --card: #1c1d24; --primary: #00e5ff; --text: #ffffff; --sub-text: #a0a8b5; --border: #2d333f; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 850px; width: 100%; background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 50px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: 2px solid var(--border); background: #12131a; color: white; font-size: 1.1em; }
        input:focus { border-color: var(--primary); outline: none; }
        button { padding: 15px 25px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; }
        #output { display: none; }
        .section-title { color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 30px; text-transform: uppercase; font-size: 0.85em; font-weight: bold; }
        .step { padding: 15px; background: rgba(255,255,255,0.03); border-left: 4px solid var(--primary); margin-top: 10px; line-height: 1.6; border-radius: 0 8px 8px 0; }
        .location-box { background: #12131a; padding: 20px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--border); }
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .move-category { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .move-pill { display: inline-block; padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); margin: 3px; border-radius: 4px; font-size: 0.8em; color: var(--primary); text-transform: capitalize; }
        .ref-links { display: flex; gap: 10px; margin-top: 15px; }
        .ref-btn { flex: 1; padding: 10px; text-align: center; text-decoration: none; color: white; border-radius: 5px; font-weight: bold; font-size: 0.8em; }
        .serebii { background: #0e7a3a; } .bulbapedia { background: #60298a; } .pokemondb { background: #cf4a10; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ PokeBreed Pro</h1>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="e.g. 'Jolly 5IV Garchomp SV'" onkeypress="if(event.key === 'Enter') generateGuide()">
        <button onclick="generateGuide()">Analyze</button>
    </div>

    <div id="output">
        <h2 id="pokeHeader" style="text-transform: capitalize; font-size: 2.2em; color: var(--primary); margin-bottom: 5px;"></h2>
        <div id="metaInfo" style="margin-bottom: 20px;"></div>

        <div class="section-title">📍 Wild Locations</div>
        <div id="locationList" class="location-box"></div>
        
        <div class="ref-links">
            <a id="linkSerebii" class="ref-btn serebii" target="_blank">Serebii</a>
            <a id="linkBulba" class="ref-btn bulbapedia" target="_blank">Bulbapedia</a>
            <a id="linkDB" class="ref-btn pokemondb" target="_blank">PokemonDB</a>
        </div>

        <div class="section-title">🛠️ Breeding & Nature Strategy</div>
        <div id="stepsList"></div>

        <div class="section-title">⚔️ Movepool Analysis</div>
        <div class="move-grid">
            <div class="move-category">
                <strong style="font-size: 0.8em; color: var(--sub-text);">LVL UP / TM MOVES</strong><br>
                <div id="mainMoves" style="margin-top: 8px;"></div>
            </div>
            <div class="move-category">
                <strong style="font-size: 0.8em; color: var(--sub-text);">EGG MOVES ONLY</strong><br>
                <div id="eggMoves" style="margin-top: 8px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const format = (s) => s.replace(/-/g, ' ');

    async function generateGuide() {
        const input = document.getElementById('userInput').value.toLowerCase();
        if(!input) return;

        const noise = ["i", "need", "a", "for", "the", "mr", "white", "jolly", "adamant", "timid", "modest", "5iv", "shiny", "sv", "in", "protection", "streets", "bold", "calm", "careful", "impish"];
        const pokemonName = input.split(/\s+/).find(w => w.length > 3 && !noise.includes(w));

        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonName}`);
            const data = await res.json();
            
            document.getElementById('output').style.display = 'block';
            document.getElementById('pokeHeader').innerText = data.name;

            // 1. Locations
            const lRes = await fetch(data.location_area_encounters);
            const lData = await lRes.json();
            document.getElementById('locationList').innerHTML = lData.length > 0 ? 
                `Spawns wild at: <strong>${format(lData[0].location_area.name)}</strong>. Check Serebii for exact rates.` : 
                "No wild spawns found (likely an evolution or gift).";

            // 2. Strategy Logic (Beefed Up)
            let steps = [];
            // EV Yields
            const evs = data.stats.filter(s => s.effort > 0).map(s => s.effort + " " + s.stat.name).join(', ');
            steps.push(`<strong>EV Training:</strong> Defeating ${data.name} gives <strong>${evs}</strong>.`);

            // Nature Logic
            const natures = ["jolly", "adamant", "timid", "modest", "bold", "calm", "careful", "impish"];
            const foundNature = natures.find(n => input.includes(n));
            if (foundNature) {
                steps.push(`🧪 <strong>Nature Fix:</strong> To get a <strong>${foundNature.toUpperCase()}</strong> one, give an <strong>Everstone</strong> to the parent with that nature.`);
            } else {
                steps.push(`🧪 <strong>Nature:</strong> Use an <strong>Everstone</strong> on the parent with the nature you want to keep.`);
            }

            // IV Logic
            if (input.includes("iv")) {
                steps.push(`📊 <strong>IV Transfer:</strong> Use the <strong>Destiny Knot</strong> on a high-stat Ditto or parent to pass down 5 IVs.`);
            }

            // Evolution Warning
            const sRes = await fetch(data.species.url);
            const sData = await sRes.json();
            const eRes = await fetch(sData.evolution_chain.url);
            const eData = await eRes.json();
            if (eData.chain.species.name !== data.name) {
                steps.push(`🧬 <strong>Evolution:</strong> Remember to breed the base form <strong>${eData.chain.species.name.toUpperCase()}</strong>.`);
            }

            document.getElementById('stepsList').innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');

            // 3. Movepool Categorization
            const mainMoves = data.moves.filter(m => m.version_group_details[0].move_learn_method.name === 'level-up' || m.version_group_details[0].move_learn_method.name === 'machine');
            const eggMoves = data.moves.filter(m => m.version_group_details[0].move_learn_method.name === 'egg');
            
            document.getElementById('mainMoves').innerHTML = mainMoves.slice(0, 10).map(m => `<span class="move-pill">${format(m.move.name)}</span>`).join('');
            document.getElementById('eggMoves').innerHTML = eggMoves.length ? eggMoves.slice(0, 10).map(m => `<span class="move-pill">${format(m.move.name)}</span>`).join('') : "None";

            // 4. Badges & Links
            document.getElementById('metaInfo').innerHTML = `<span style="background:var(--primary); color:#000; padding:4px 10px; border-radius:5px; font-weight:bold; font-size:0.8em; margin-right:10px;">${format(sData.egg_groups[0].name)}</span> <span style="color:var(--sub-text); font-size:0.8em;">Steps: ~${(sData.hatch_counter + 1) * 255}</span>`;
            
            const cn = data.name.split('-')[0];
            document.getElementById('linkSerebii').href = `https://www.serebii.net/pokedex-sv/${cn}/`;
            document.getElementById('linkBulba').href = `https://bulbapedia.bulbagarden.net/wiki/${cn}_(Pokémon)`;
            document.getElementById('linkDB').href = `https://pokemondb.net/pokedex/${cn}`;

        } catch (e) {
            alert("Double check that spelling, Mr. White!");
        }
    }
</script>
</body>
</html>

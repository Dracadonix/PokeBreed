<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Ultimate Edition</title>
    <style>
        :root { --primary: #ff1c1c; --secondary: #3b4cca; --bg: #0f1014; --card: #1c1d24; --text: #f0f0f0; --accent: #ffd700; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 850px; width: 100%; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 1px solid #333; }
        h1 { color: var(--primary); text-align: center; font-size: 2.5em; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; }
        .subtitle { text-align: center; opacity: 0.6; margin-bottom: 30px; font-size: 0.9em; }
        .input-group { display: flex; gap: 12px; margin-bottom: 30px; }
        input { flex: 1; padding: 16px; background: #2a2b36; border: 2px solid #3d3d4d; border-radius: 12px; color: white; outline: none; font-size: 1.1em; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,28,28,0.2); }
        button { padding: 16px 28px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #d11515; transform: translateY(-2px); }
        #output { display: none; animation: slideUp 0.5s ease; }
        .section-title { font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px; color: var(--secondary); margin: 25px 0 10px; font-weight: 700; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .badge { display: inline-block; background: var(--secondary); color: white; padding: 5px 14px; border-radius: 8px; font-size: 0.75em; font-weight: bold; margin: 0 8px 8px 0; text-transform: capitalize; }
        .step { margin-bottom: 12px; padding: 18px; background: #25262f; border-left: 6px solid var(--primary); border-radius: 0 12px 12px 0; line-height: 1.6; }
        .location-box { background: #12131a; border: 1px solid #333; padding: 20px; border-radius: 15px; margin: 20px 0; }
        .ref-links { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .ref-btn { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 0.8em; text-decoration: none; color: white; font-weight: bold; transition: 0.2s; min-width: 100px; }
        .serebii { background: #0e7a3a; } .bulbapedia { background: #70379b; } .pokemondb { background: #e05210; }
        .ref-btn:hover { opacity: 0.85; filter: brightness(1.2); }
        .move-pill { display: inline-block; background: #343541; padding: 4px 10px; border-radius: 6px; font-size: 0.8em; margin: 3px; border: 1px solid #444; text-transform: capitalize; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ PokeBreed Pro</h1>
    <p class="subtitle">Ultimate Breeding Intelligence Engine</p>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Try: 'Jolly 5IV HA Garchomp with Outrage in SV'">
        <button onclick="generateGuide()">Analyze</button>
    </div>

    <div id="output">
        <h2 id="pokeHeader" style="margin-bottom:5px; color:var(--primary); font-size: 2em;"></h2>
        <div id="metaInfo"></div>
        
        <div class="section-title">📍 Wild Locations & References</div>
        <div id="locationData" class="location-box">
            <div id="locationList" style="font-size: 0.95em; margin-bottom: 15px; color: #ccc;"></div>
            <div class="ref-links">
                <a id="linkSerebii" class="ref-btn serebii" target="_blank">Serebii Dex</a>
                <a id="linkBulba" class="ref-btn bulbapedia" target="_blank">Bulbapedia</a>
                <a id="linkDB" class="ref-btn pokemondb" target="_blank">PokemonDB</a>
            </div>
        </div>

        <div class="section-title">🛠️ Breeding Instructions</div>
        <div id="stepsList"></div>

        <div class="section-title">🥚 Inheritable Movepool</div>
        <div id="movepoolSection"></div>
    </div>
</div>

<script>
    // Helper function to capitalize words properly
    function cap(str) {
        return str.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    async function generateGuide() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const words = input.replace(/[?!.]/g, "").split(' ');
        
        const gameMap = { "bdsp": "BDSP", "sv": "Scarlet/Violet", "swsh": "Sword/Shield", "sword": "Sword", "shield": "Shield" };
        const activeKey = Object.keys(gameMap).find(k => input.includes(k)) || "default";

        const excluded = ["how", "to", "get", "find", "where", "is", "breed", "in", "the", "a", "an", "with", "of", ...Object.keys(gameMap)];
        const potentialNames = words.filter(w => !excluded.includes(w) && w.length > 2);

        let data = null;
        for (let name of potentialNames) {
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                if (res.ok) { data = await res.json(); break; }
            } catch (e) { continue; }
        }

        if (!data) return alert("Pokémon not identified. Please check your spelling!");

        const sRes = await fetch(data.species.url);
        const sData = await sRes.json();
        
        document.getElementById('output').style.display = 'block';
        document.getElementById('pokeHeader').innerText = cap(data.name);

        // 1. References
        const baseName = data.name.split('-')[0];
        document.getElementById('linkSerebii').href = `https://www.serebii.net/pokedex-sv/${baseName}/`;
        document.getElementById('linkBulba').href = `https://bulbapedia.bulbagarden.net/wiki/${cap(baseName)}_(Pokémon)`;
        document.getElementById('linkDB').href = `https://pokemondb.net/pokedex/${baseName}`;

        // 2. Meta Info
        const hatchSteps = sData.hatch_counter * 255;
        document.getElementById('metaInfo').innerHTML = `
            ${sData.egg_groups.map(g => `<span class="badge">${cap(g.name)}</span>`).join('')}
            <span class="badge" style="background:#444">~${hatchSteps.toLocaleString()} Steps</span>
            <span class="badge" style="background:#e0a800; color: #000;">Game: ${gameMap[activeKey] || 'Universal'}</span>
        `;

        // 3. Location Logic
        const locRes = await fetch(data.location_area_encounters);
        const locData = await locRes.json();
        let locHtml = "Wild encounters not found in standard API data. Cross-reference using buttons below.";
        if (locData.length > 0) {
            const relevant = activeKey !== "default" ? 
                locData.filter(l => l.version_details.some(v => v.version.name.includes(activeKey))) : 
                locData.slice(0, 3);
            if (relevant.length > 0) {
                locHtml = "Commonly found in: " + relevant.map(l => `<strong>${cap(l.location_area.name)}</strong>`).join(', ');
            }
        }
        document.getElementById('locationList').innerHTML = locHtml;

        // 4. Instructions
        let steps = [];
        if (input.includes("shiny")) steps.push(`✨ <strong>Masuda Method:</strong> Use two parents from different real-world languages to maximize Shiny odds.`);
        
        const natures = ["jolly", "timid", "adamant", "modest", "bold", "calm", "careful", "impish"];
        const natureFound = natures.find(n => input.includes(n));
        if (natureFound) steps.push(`🧪 <strong>Everstone:</strong> Give to the <strong>${cap(natureFound)}</strong> parent to pass down the Nature.`);

        if (input.includes("iv") || input.includes("perfect")) {
            steps.push(`📊 <strong>Destiny Knot:</strong> Give to the parent with the best stats. Aim for 5 'Best' IVs.`);
        }

        const eggMoves = data.moves.filter(m => m.version_group_details.some(v => v.move_learn_method.name === 'egg')).map(m => m.move.name);
        const requestedMove = eggMoves.find(m => input.includes(m.replace('-', ' ')));
        if (requestedMove) {
            steps.push(`🥚 <strong>Egg Move:</strong> A parent must know <strong>${cap(requestedMove)}</strong>. ${activeKey === 'sv' ? '<em>*Or use Mirror Herb in SV!</em>' : ''}`);
        }

        document.getElementById('stepsList').innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');
        document.getElementById('movepoolSection').innerHTML = eggMoves.map(m => `<span class="move-pill">${cap(m)}</span>`).join('');
    }
</script>

</body>
</html>

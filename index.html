<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Game-Specific Edition</title>
    <style>
        :root { --bg: #0c0d10; --card: #16181d; --primary: #00e5ff; --text: #f0f0f0; --sub-text: #a0a8b5; --border: #2d333f; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 850px; width: 100%; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-top: 40px; height: fit-content; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }
        .subtitle { text-align: center; color: var(--sub-text); margin-bottom: 35px; font-size: 0.85em; }
        .input-group { display: flex; gap: 12px; margin-bottom: 30px; }
        input { flex: 1; padding: 18px; background: #1a1c23; border: 2px solid var(--border); border-radius: 12px; color: white; font-size: 1.1em; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 18px 30px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #output { display: none; }
        .section-title { color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-top: 35px; text-transform: uppercase; font-size: 0.85em; font-weight: 800; }
        .step { padding: 18px; background: rgba(255,255,255,0.02); border-left: 5px solid var(--primary); margin-top: 12px; line-height: 1.6; border-radius: 0 10px 10px 0; border: 1px solid var(--border); border-left-width: 5px; }
        .location-box { background: #111216; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-top: 12px; }
        .move-pill { display: inline-block; padding: 5px 12px; background: var(--bg); border: 1px solid var(--border); margin: 4px; border-radius: 6px; font-size: 0.8em; color: var(--primary); text-transform: capitalize; }
        .egg-pill { border-color: #ff00ff; color: #ff00ff; } /* Pink glow for Egg Moves */
        #rowanPopup { display: none; position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 650px; background: #fdfdfd; border: 6px double #333; padding: 25px; z-index: 9999; color: #222; font-family: 'Courier New', monospace; box-shadow: 0 0 0 5000px rgba(0,0,0,0.8); }
        .rowan-title { font-weight: 900; color: #b00; border-bottom: 2px solid #333; margin-bottom: 10px; display: inline-block; }
        .ref-links { display: flex; gap: 12px; margin-top: 18px; }
        .ref-btn { flex: 1; padding: 12px; text-align: center; text-decoration: none; color: white; border-radius: 10px; font-weight: 800; font-size: 0.85em; }
        .serebii { background: #0e7a3a; } .bulbapedia { background: #60298a; } .pokemondb { background: #cf4a10; }
    </style>
</head>
<body>

<div id="rowanPopup">
    <div class="rowan-title">PROF. ROWAN</div><br>
    <div id="rowanText">Precision is paramount! That Pokemon name does not exist in our records!</div>
    <button style="background:#333; color:#fff; border:none; padding:8px 20px; float:right; cursor:pointer;" onclick="closeRowan()">OK</button>
</div>

<div class="container">
    <h1>⚡ PokeBreed Pro</h1>
    <p class="subtitle">Breeding • Strategy • Game-Specific Locations</p>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="e.g. 'Jolly Garchomp SV'" onkeypress="if(event.key === 'Enter') generateGuide()">
        <button onclick="generateGuide()">Analyze</button>
    </div>

    <div id="output">
        <h2 id="pokeHeader" style="text-transform: capitalize; font-size: 2.5em; color: var(--primary); margin: 0;"></h2>
        <div id="gameBadge" style="margin-bottom: 15px;"></div>

        <div class="section-title">📍 Wild Encounter Locations</div>
        <div id="locationList" class="location-box"></div>
        
        <div class="ref-links">
            <a id="linkSerebii" class="ref-btn serebii" target="_blank">Serebii</a>
            <a id="linkBulba" class="ref-btn bulbapedia" target="_blank">Bulbapedia</a>
            <a id="linkDB" class="ref-btn pokemondb" target="_blank">PokemonDB</a>
        </div>

        <div class="section-title">⚔️ Genetic Egg Moves (Must be Bred)</div>
        <div id="eggMovepool" style="margin-top: 12px;"></div>

        <div class="section-title">🛠️ Breeding & Strategy</div>
        <div id="stepsList"></div>

        <div class="section-title">📖 TMs & Level-Up Moves</div>
        <div id="standardMovepool" style="margin-top: 12px;"></div>
    </div>
</div>

<script>
    const format = (str) => str.replace(/-/g, ' ');
    function closeRowan() { document.getElementById('rowanPopup').style.display = 'none'; }

    async function generateGuide() {
        const input = document.getElementById('userInput').value.toLowerCase().trim();
        if(!input) return;

        // Game Detection Logic
        const games = { "sv": "scarlet-violet", "swsh": "sword-shield", "bdsp": "brilliant-diamond-shining-pearl" };
        const activeGameKey = Object.keys(games).find(k => input.includes(k)) || "default";
        const gameDisplay = activeGameKey.toUpperCase();

        const noise = ["get", "find", "breed", "need", "iv", "5iv", "shiny", "jolly", "adamant", "timid", "modest", "bold", "calm", "careful", "impish", "in", "the", "sv", "swsh", "bdsp"];
        const pokemonName = input.split(/\s+/).find(w => w.length > 2 && !noise.includes(w));

        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonName}`);
            if(!res.ok) throw new Error();
            const data = await res.json();
            
            document.getElementById('output').style.display = 'block';
            document.getElementById('pokeHeader').innerText = data.name;
            document.getElementById('gameBadge').innerHTML = activeGameKey !== "default" ? `<span style="color:var(--primary); font-weight:bold; font-size:0.8em;">GAME: ${gameDisplay}</span>` : "";

            // 1. Game-Specific Location Logic
            const lRes = await fetch(data.location_area_encounters);
            const lData = await lRes.json();
            let locText = "No specific wild spawns found.";
            
            if (lData.length > 0) {
                // Filter encounters by game if a game was specified
                const filtered = activeGameKey === "default" ? lData : lData.filter(loc => 
                    loc.version_details.some(v => v.version.name.includes(activeGameKey))
                );
                const source = filtered.length > 0 ? filtered : lData;
                locText = `Commonly found at: <strong>${format(source[0].location_area.name)}</strong>.`;
            }
            document.getElementById('locationList').innerHTML = locText;

            // 2. Separate Egg Moves
            const eggMoves = data.moves.filter(m => m.version_group_details.some(v => v.move_learn_method.name === 'egg'));
            const stdMoves = data.moves.filter(m => m.version_group_details.some(v => v.move_learn_method.name === 'level-up' || v.move_learn_method.name === 'machine'));

            document.getElementById('eggMovepool').innerHTML = eggMoves.length > 0 ? 
                eggMoves.slice(0, 10).map(m => `<span class="move-pill egg-pill">${format(m.move.name)}</span>`).join('') : "No Egg Moves available.";
            
            document.getElementById('standardMovepool').innerHTML = stdMoves.slice(0, 12).map(m => `<span class="move-pill">${format(m.move.name)}</span>`).join('');

            // 3. Strategy
            let steps = [];
            const evs = data.stats.filter(s => s.effort > 0).map(s => s.effort + " " + s.stat.name).join(', ');
            steps.push(`<strong>EV Yield:</strong> This Pokemon yields <strong>${evs}</strong>.`);

            const natures = ["jolly", "adamant", "timid", "modest", "bold", "calm", "careful", "impish"];
            const n = natures.find(x => input.includes(x));
            if(n) steps.push(`🧪 <strong>Nature:</strong> Since you want <strong>${n.toUpperCase()}</strong>, the parent must hold an <strong>Everstone</strong>.`);
            
            if(input.includes("iv")) steps.push(`📊 <strong>IVs:</strong> Use a <strong>Destiny Knot</strong> on a 6IV parent to pass down 5 IVs.`);

            document.getElementById('stepsList').innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');

            // 4. Update External Links for Game
            const cn = data.name.split('-')[0];
            const serebiiSuffix = activeGameKey === "sv" ? "pokedex-sv" : (activeGameKey === "swsh" ? "pokedex-swsh" : "pokedex-sm");
            document.getElementById('linkSerebii').href = `https://www.serebii.net/${serebiiSuffix}/${cn}/`;
            document.getElementById('linkBulba').href = `https://bulbapedia.bulbagarden.net/wiki/${cn}_(Pokémon)`;
            document.getElementById('linkDB').href = `https://pokemondb.net/pokedex/${cn}`;

        } catch (e) {
            document.getElementById('rowanPopup').style.display = 'block';
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | The Rowan Laboratory</title>
    <style>
        :root { --bg: #0c0d10; --card: #16181d; --primary: #00e5ff; --text: #f0f0f0; --border: #2d333f; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 850px; width: 100%; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-top: 40px; transition: all 0.5s ease; }
        h1 { color: var(--primary); text-align: center; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }
        .input-group { display: flex; gap: 12px; margin-bottom: 30px; }
        input { flex: 1; padding: 18px; background: #1a1c23; border: 2px solid var(--border); border-radius: 12px; color: white; font-size: 1.1em; outline: none; }
        button { padding: 18px 30px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        /* ROWAN'S DS-STYLE DIALOGUE BOX */
        #rowanPopup {
            display: none; position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 650px; background: #fdfdfd; border: 6px double #333;
            padding: 30px; z-index: 9999; color: #222; font-family: 'Courier New', monospace;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.8); transition: all 0.1s;
        }
        .rowan-header { font-weight: 900; color: #b00; border-bottom: 3px solid #333; margin-bottom: 15px; font-size: 1.3em; }
        .rowan-btn { background: #333; color: white; border: none; padding: 10px 25px; float: right; cursor: pointer; font-weight: bold; margin-top: 15px; }

        @keyframes shake { 0%, 100% { transform: translateX(-50%); } 25% { transform: translateX(-51%); } 75% { transform: translateX(-49%); } }
        @keyframes ultra-rage { 0% { transform: translate(-50%, 0); } 10% { transform: translate(-53%, 3%); } 20% { transform: translate(-47%, -3%); } 100% { transform: translate(-50%, 0); } }
        .intense-shake { animation: ultra-rage 0.05s infinite !important; }
        .crash-bg { background: #a00 !important; color: #fff !important; border-color: #f00 !important; }
        
        #output { display: none; }
        .suggestion-link { color: #0066cc; cursor: pointer; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div id="rowanPopup">
    <div id="rowanHeader" class="rowan-header">PROF. ROWAN</div><br>
    <div id="rowanText">...</div>
    <div id="rowanSuggestions" style="margin-top: 10px; font-size: 0.85em; display:none; background: #eee; padding: 10px; border: 1px dashed #333; color: #333;">
        Did your pen slip? <span id="suggestionList"></span>?
    </div>
    <button id="rowanBtn" class="rowan-btn" onclick="closeRowan()">SORRY, PROFESSOR...</button>
</div>

<div class="container" id="mainApp">
    <h1>⚡ PokeBreed Pro</h1>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Search (e.g. 'Glibe SV')" onkeypress="if(event.key === 'Enter') generateGuide()">
        <button onclick="generateGuide()">Analyze</button>
    </div>
    <div id="output">
        <h2 id="pokeHeader" style="text-transform: capitalize; font-size: 2em; color: var(--primary);"></h2>
        <div id="breedingLogic" style="padding:15px; background:rgba(255,255,255,0.05); border-radius:10px;">Searching results...</div>
    </div>
</div>

<script>
    let pokemonNames = [];
    let failedCount = 0;
    let rageThreshold = Math.floor(Math.random() * 11) + 5; // 5 to 15

    const phrases = {
        low: [
            "Be precise with your data. Precision is the mark of a researcher.",
            "Hmm. I don't recognize that name. Try again.",
            "A Pokémon trainer should at least know how to spell their target's name.",
            "My research notes have no mention of such a creature."
        ],
        mid: [
            "Your handwriting is becoming illegible. Focus!",
            "I've researched Pokémon for 60 years and NEVER heard of that species.",
            "Is your Pokédex broken, or are you simply not using it?",
            "Again? You're testing the limits of my afternoon, young one."
        ],
        high: [
            "Grah! My patience is wearing thin! Look at the suggestions!",
            "I am a busy man! Do not come into my lab with such sloppy data!",
            "You are making a mockery of the scientific process!",
            "SILENCE! Correct your spelling before I lose my composure!"
        ],
        crash: [
            "GRAAAAAAH!!! I CANNOT TAKE ANOTHER SECOND OF THIS INCOMPETENCE!!",
            "OUT!! GET OUT OF MY LABORATORY!! YOUR STUPIDITY IS CONTAMINATING THE SAMPLES!!",
            "THATS IT!! I'M RETIRING!! I CAN'T TEACH SOMEONE WHO CAN'T SPELL 'GIBLE'!!",
            "I HAVE HAD ENOUGH!! LEAVE BEFORE I CALL THE GALACTIC GRUNTS TO DRAG YOU OUT!!"
        ]
    };

    fetch('https://pokeapi.co/api/v2/pokemon?limit=2000').then(res => res.json()).then(data => {
        pokemonNames = data.results.map(p => p.name);
    });

    function getDistance(a, b) {
        const m = Array.from({length: a.length+1}, (_, i) => [i]);
        for(let j=0; j<=b.length; j++) m[0][j] = j;
        for(let i=1; i<=a.length; i++) {
            for(let j=1; j<=b.length; j++) {
                const cost = a[i-1] === b[j-1] ? 0 : 1;
                m[i][j] = Math.min(m[i-1][j]+1, m[i][j-1]+1, m[i-1][j-1]+cost);
            }
        }
        return m[a.length][b.length];
    }

    const randomPhrase = (tier) => phrases[tier][Math.floor(Math.random() * phrases[tier].length)];
    function closeRowan() { document.getElementById('rowanPopup').style.display = 'none'; }

    async function generateGuide() {
        const input = document.getElementById('userInput').value.toLowerCase().trim();
        const pokemonName = input.split(/\s+/).find(w => w.length > 2 && !["sv","iv","shiny"].includes(w));

        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonName}`);
            if(!res.ok) throw new Error();
            const data = await res.json();
            
            failedCount = 0; 
            document.getElementById('output').style.display = 'block';
            document.getElementById('pokeHeader').innerText = data.name;
        } catch (e) {
            failedCount++;
            const popup = document.getElementById('rowanPopup');
            const text = document.getElementById('rowanText');
            const app = document.getElementById('mainApp');
            const suggestDiv = document.getElementById('rowanSuggestions');
            
            popup.style.display = 'block';
            popup.style.animation = "shake 0.3s ease-in-out";

            if (failedCount >= rageThreshold) {
                // THE CRASH OUT
                popup.classList.add('crash-bg', 'intense-shake');
                text.innerHTML = randomPhrase('crash');
                document.getElementById('rowanBtn').style.display = 'none';
                app.style.opacity = '0';
                app.style.transform = "scale(0.5) rotate(5deg)";

                setTimeout(() => {
                    popup.classList.remove('crash-bg', 'intense-shake');
                    text.innerHTML = "...*huff*... *huff*... Forgive me. I am 60 years old. My heart can only take so much. Let us reset and try to be... better.";
                    document.getElementById('rowanBtn').style.display = 'block';
                    document.getElementById('rowanBtn').innerText = "YES, PROFESSOR.";
                    failedCount = 0;
                    rageThreshold = Math.floor(Math.random() * 11) + 5;
                    app.style.opacity = '1';
                    app.style.transform = "scale(1) rotate(0deg)";
                }, 6000);
            } else {
                let tier = 'low';
                if (failedCount > (rageThreshold * 0.7)) tier = 'high';
                else if (failedCount > (rageThreshold * 0.3)) tier = 'mid';
                
                text.innerText = `[Attempt ${failedCount}] ` + randomPhrase(tier);
                
                const suggestions = pokemonNames.map(n => ({n, d: getDistance(pokemonName || "", n)})).filter(x => x.d <= 2).sort((a,b)=>a.d-b.d).slice(0,3);
                if(suggestions.length > 0) {
                    suggestDiv.style.display = "block";
                    document.getElementById('suggestionList').innerHTML = suggestions.map(s => `<span class="suggestion-link" onclick="document.getElementById('userInput').value='${s.n}'; generateGuide(); closeRowan();">${s.n}</span>`).join(', ');
                } else {
                    suggestDiv.style.display = "none";
                }
            }
        }
    }
</script>
</body>
</html>

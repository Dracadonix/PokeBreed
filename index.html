<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBreed Pro | Regional v95M</title>
    <style>
        :root { 
            --void: #020408; --ring: #00f2ff; --ring-glow: rgba(0, 242, 255, 0.3);
            --sub: #475569; --warn: #ff0055; --surface: rgba(15, 23, 42, 0.98);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: crosshair; }
        body { 
            background: var(--void); background-image: radial-gradient(circle at 50% 0%, #0f172a 0%, var(--void) 90%);
            color: #f1f5f9; margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 1500px; margin: 0 auto; }

        /* MULTI-PROFESSOR HUD */
        .prof-header { 
            display: flex; align-items: center; gap: 30px; background: var(--surface);
            padding: 30px; border-left: 4px solid var(--ring); margin-bottom: 40px;
        }
        .prof-avatar { width: 80px; height: 80px; background: #1e293b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--ring); border: 2px solid var(--ring); }
        
        .rack { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .ball { flex: 1; background: var(--surface); border: 1px solid rgba(0, 242, 255, 0.1); padding: 15px; border-radius: 4px; text-align: center; cursor: pointer; }
        .ball.active { border-color: var(--ring); box-shadow: 0 0 20px var(--ring-glow); }

        /* THE TRIPLE PANEL GRID */
        .grid { display: grid; grid-template-columns: 1fr 1.2fr 0.8fr; gap: 25px; display: none; }
        .panel { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); padding: 30px; position: relative; }
        .tag { font-size: 9px; font-weight: 900; color: var(--ring); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; display: block; }

        /* MOVE SCROLLER */
        .move-list { height: 400px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .move-row { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; font-size: 13px; }
        .legacy { color: var(--warn); font-size: 8px; font-weight: 900; border: 1px solid var(--warn); padding: 1px 4px; border-radius: 2px; }

        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--ring); padding: 15px; color: var(--ring); text-align: center; font-size: 20px; outline: none; margin-bottom: 40px; font-family: 'Fira Code', monospace; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="prof-header" id="profHUD">
        <div class="prof-avatar" id="profIcon">?</div>
        <div>
            <span id="profName" style="font-size: 10px; font-weight: 900; color: var(--sub); letter-spacing: 4px;">WAITING FOR INPUT...</span>
            <div id="profTalk" style="font-size: 16px; margin-top: 5px; line-height: 1.5; font-style: italic; max-width: 800px;">"Science requires data. Provide a specimen name to begin the regional link."</div>
        </div>
    </div>

    <div class="rack" id="rack">
        <script>
            for(let i=0; i<6; i++) document.write(`<div class="ball" id="b${i}" onclick="sel(${i})"><span style="font-size:10px; font-weight:900;" id="n${i}">EMPTY</span></div>`);
        </script>
    </div>

    <input type="text" id="inp" placeholder="Target Specimen (e.g. 'Jolly Dragonite')" onkeypress="if(event.key==='Enter') execute()">

    <div id="display" class="grid">
        <div class="panel">
            <span class="tag">I. Inheritance Protocol</span>
            <div style="background:rgba(0,0,0,0.2); padding:20px; border:1px dashed var(--sub); text-align:center; margin-bottom:20px;">
                <div style="font-size:10px; color:var(--ring); font-weight:900;">PARENT A (Everstone)</div>
                <div style="font-size:18px; margin:10px 0;">✚</div>
                <div style="font-size:10px; color:var(--ring); font-weight:900;">PARENT B (Destiny Knot)</div>
            </div>
            <div id="inheritanceSteps" style="font-size:13px; color:var(--sub); line-height:1.8;"></div>
        </div>

        <div class="panel">
            <span class="tag">II. Specimen Biometrics</span>
            <h2 id="name" style="font-size: 40px; margin: 0; font-weight: 200;"></h2>
            <div id="stats" style="margin: 30px 0;"></div>
            <div id="errorLog" style="padding:20px; border-left:2px solid var(--warn); background:rgba(255,0,85,0.05); display:none;">
                <span style="font-size:9px; font-weight:900; color:var(--warn);">SYSTEM DISCREPANCY</span>
                <p id="errorText" style="font-size:13px; margin-top:5px;"></p>
            </div>
        </div>

        <div class="panel">
            <span class="tag">III. Developmental Movepool</span>
            <div class="move-list" id="moveList"></div>
            <div style="margin-top:20px; font-size:10px; color:var(--sub);">*LEGACY TAG: Indicates move is lost upon evolution.</div>
        </div>
    </div>
</div>

<script>
    let active = 0; let cur = null;
    const clean = (s) => s.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

    const regionData = {
        'kanto': { prof: 'Oak', color: '#22c55e', talk: 'This Pokémon has been a staple of my research for years! Treat it with kindness and it will serve you well.' },
        'johto': { prof: 'Elm', color: '#eab308', talk: 'Ah, a rare discovery! Breeding these requires immense patience. Focus on the evolutionary timing!' },
        'hoenn': { prof: 'Birch', color: '#3b82f6', talk: 'From the wilds to the lab! This specimen is known for its rugged adaptability. Check the moves!' },
        'sinnoh': { prof: 'Rowan', color: '#00f2ff', talk: 'Evolution is a profound mystery. If you rush this, you are no better than a common collector. PAY ATTENTION.' },
        'kalos': { prof: 'Sycamore', color: '#ec4899', talk: 'Magnificent! Its potential for beauty and power is limitless. Let us perfect its genetic elegance.' }
    };

    function init() {
        for(let i=0; i<6; i++) {
            const d = localStorage.getItem('v95_'+i);
            if(d) document.getElementById('n'+i).innerText = JSON.parse(d).name;
        }
        sel(0);
    }

    function sel(i) {
        active = i;
        document.querySelectorAll('.ball').forEach(b => b.classList.remove('active'));
        document.getElementById('b'+i).classList.add('active');
        const d = localStorage.getItem('v95_'+i);
        if(d) render(JSON.parse(d));
        else document.getElementById('display').style.display = 'none';
    }

    async function execute() {
        const q = document.getElementById('inp').value.toLowerCase();
        const list = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1010').then(r=>r.json());
        const t = list.results.find(p => q.includes(p.name))?.name;
        if(!t) return;

        const [p, sp] = await Promise.all([
            fetch(`https://pokeapi.co/api/v2/pokemon/${t}`).then(r=>r.json()),
            fetch(`https://pokeapi.co/api/v2/pokemon-species/${t}`).then(r=>r.json())
        ]);

        const reg = sp.generation.name.split('-')[1] || 'kanto';
        const moves = p.moves.map(m => ({name: m.move.name, lvl: m.version_group_details[0].level_learned_at})).sort((a,b)=>a.lvl-b.lvl);
        
        // ROWAN INTERVENTION
        let err = "";
        if (q.includes('adamant') && p.stats[3].base_stat > p.stats[1].base_stat) {
            err = "Rowan here. You are trying to lock a Physical nature into a Special Attacker. This is academic negligence. Fix it.";
        }

        cur = { name: clean(t), stats: p.stats, moves, err, q, reg: regionData[reg] || regionData['kanto'] };
        render(cur);
    }

    function render(d) {
        document.getElementById('display').style.display = 'grid';
        document.getElementById('profName').innerText = `PROFESSOR ${d.reg.prof.toUpperCase()} // ${d.reg.prof === 'Rowan' ? 'URGENT' : 'ADVISORY'}`;
        document.getElementById('profTalk').innerText = d.reg.talk;
        document.getElementById('profIcon').innerText = d.reg.prof[0];
        document.getElementById('profIcon').style.borderColor = d.reg.color;

        document.getElementById('name').innerText = d.name;
        const errBox = document.getElementById('errorLog');
        if (d.err) { errBox.style.display = 'block'; document.getElementById('errorText').innerText = d.err; }
        else { errBox.style.display = 'none'; }

        document.getElementById('inheritanceSteps').innerHTML = `
            1. Secure Parent A with <b>${d.q.split(' ')[0]}</b> nature.<br>
            2. Apply <b>Everstone</b> to Parent A.<br>
            3. Apply <b>Destiny Knot</b> to Parent B.<br>
            4. Incubate <b>${d.name}</b> DNA.
        `;

        document.getElementById('stats').innerHTML = d.stats.map(st => `
            <div style="margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:900; color:var(--sub);">
                    <span>${st.stat.name.toUpperCase()}</span><span>${st.base_stat}</span>
                </div>
                <div style="height:2px; background:rgba(255,255,255,0.05); margin-top:5px;">
                    <div style="height:100%; background:var(--ring); width:${(st.base_stat/255)*100}%"></div>
                </div>
            </div>`).join('');

        document.getElementById('moveList').innerHTML = d.moves.map(m => `
            <div class="move-row">
                <span><b>Lv.${m.lvl}</b> ${clean(m.name)}</span>
                ${m.lvl > 35 ? '<span class="legacy">LEGACY</span>' : ''}
            </div>`).join('');
    }

    function save() {
        if(!cur) return;
        localStorage.setItem('v95_'+active, JSON.stringify(cur));
        document.getElementById('n'+active).innerText = cur.name;
    }
</script>
</body>
</html>
